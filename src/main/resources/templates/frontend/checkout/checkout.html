<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結帳｜台北GO了沒</title>
<link rel="stylesheet" th:href="@{/css/index/header.css}">
<link rel="stylesheet" th:href="@{/css/index/footer.css}">
<link rel="stylesheet" th:href="@{/css/checkout/checkout.css}">
</head>
<body>

    <!-- Header -->
    <div th:replace="~{frontend/index/header :: header}"></div>
    <main class="checkout-page">
        <h1 class="page-title">確認訂單</h1>
        <div class="checkout-wrapper">
        
        <div class="card">
			  <!-- ================= 訂購人資訊 ================= -->
			    <h2>訂購人資訊</h2>
			    <div class="customer-info">
			        <div class="info-row"> <span>姓名</span> <span th:text="${loginCustomer.custName}"></span> </div>
			        <div class="info-row"> <span>Email</span> <span th:text="${loginCustomer.custEmail}"></span> </div>
			        <div class="info-row"><span>電話</span> <span th:text="${loginCustomer.custTel}"></span></div>
			    </div>			
			</div>
			 <!-- ================= 商品明細 ================= -->
			<section class="checkout-left">
				<div class="card">
					<h2>商品明細</h2>
					<div th:each="item : ${cartItems}" class="checkout-item">
						<img th:src="${item.imageUrl}" class="product-image">
						<div class="item-info">
							<div class="item-name" th:text="${item.productName}"></div>
							<div class="item-date" th:text="'使用日期：' + ${#temporals.format(item.expiryDate,'yyyy-MM-dd')}"></div>
							<div class="item-price" th:text="'NT$ ' + ${item.price}"></div>
						</div>
						<div class="item-quantity">x <span th:text="${item.quantity}"></span></div>
						<div class="item-subtotal" th:text="'NT$ ' + ${item.subtotal}">
						</div>
					</div>
				</div>
			</section>

			<!-- ================= 訂單摘要 ================= -->
            <aside class="checkout-right">
				<div class="summary-row">
					<span>商品數量</span> <span th:text="${totalCount}"></span>
				</div>
				<div class="summary-row total">
					<span>總金額</span> <span th:text="'NT$ ' + ${#numbers.formatInteger(totalAmount,0,'COMMA')}"></span>
				</div>

				<div class="card payment-card">
                    <h2>信用卡付款</h2>
                    <div class="form-group">
                        <label>持卡人姓名</label>
						<input id="cardName"　class="form-control"  placeholder="請輸入持卡人姓名">
						<div id="cardNameError" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>信用卡號</label>
                        <input id="cardNumber"  class="form-control"  placeholder="1234 5678 9012 3456">
                    	<div id="cardNumberError" class="error-message"></div>
                    </div>

                    <div class="row">
                        <div class="form-group half">
                            <label>有效期限</label>
                            <input id="expiry" class="form-control"  maxlength="5" placeholder="MM/YY">
							<div id="expiryError" class="error-message"></div>                        
						</div>
					</div>
					
                        <div class="form-group half">
                            <label>安全碼</label>
								<input id="cvv"  class="form-control"  maxlength="3" placeholder="CVV"> 
								<div id="cvvError" class="error-message"></div>
                   		 </div>
						<button id="payBtn" class="btn btn-warning w-100"  disabled> 確認付款</button> </div>
          	  </aside>
        </div>
    </main>

    <!-- JS -->
    <div th:replace="~{frontend/index/footer :: footer}"></div>
    <script th:src="@{/js/checkout/checkout.js}"></script>
    <script th:src="@{/js/index/header.js}"></script>
</body>

</html>
