<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <!-- 
        這是一個可重用的「隨機主題活動」組件。
        未來在 index.html 只需要加入：
        <div th:replace="~{frontend/activity/randomActivitySection :: randomActivitySection}"></div>
    -->
    <section th:fragment="randomActivitySection">
        
        <!-- 引入 activity-list.css 確保網格與卡片樣式能在首頁正常顯示 -->
        <link rel="stylesheet" th:href="@{/css/activity/activity-list.css}">

        <!-- 存放隨機區塊的容器 -->
        <div id="randomThemeSectionContainer" style="max-width: 1200px; margin: 10px auto 60px auto; padding: 0 20px;">
            <p style="text-align: center; color: #999;">為您推薦精選行程載入中...</p>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                
                // 呼叫你寫好的首頁區塊 API
                fetch('/activities/home-sections')
                    .then(res => res.json())
                    .then(sections => {
                        const container = document.getElementById('randomThemeSectionContainer');
                        container.innerHTML = ''; // 清除載入中文字

                        if (!sections || sections.length === 0) return;

                        // 核心邏輯：只抓取「懶得規劃」這一列
                        const targetSection = sections.find(s => s.categoryName && s.categoryName.includes('懶得規劃'));

                        if (!targetSection) {
                            container.innerHTML = '<p style="text-align: center; color: #999;">目前沒有推薦行程</p>';
                            return;
                        }

                        // 1. 去掉原本的 H2 標題，改成靠右的「查看所有活動」文字連結
                        const sectionDiv = document.createElement('div');
                        sectionDiv.className = 'theme-section';
                        sectionDiv.innerHTML = `
                            <div style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
                                <a href="/activity" style="color: #ff5722; text-decoration: none; font-size: 15px; font-weight: bold;">查看所有活動 &gt;</a>
                            </div>
                        `;

                        // 2. 建立活動網格 (沿用 .activity-grid 樣式)
                        const gridDiv = document.createElement('div');
                        gridDiv.className = 'activity-grid';

                        // 3. 把那 3 張卡片塞進去
                        targetSection.activities.forEach(activity => {
                            
                            // 圖片縮圖處理
                            let imageUrl = '/images/default-activity.jpg';
                            if (activity.activityImage && activity.activityImage.length > 0) {
                                let originalSrc = activity.activityImage[0].activityImageSrc;
                                let parts = originalSrc.split('/');
                                let filename = parts.pop();
                                let baseName = filename.substring(0, filename.lastIndexOf('.'));
                                if (!baseName) baseName = filename;
                                imageUrl = '/images/activity/thumb_' + baseName + '.jpg';
                            }

                            // 產生 HTML
                            const cardHtml = `
                                <a href="/activity/detail?activityId=${activity.activityId}" class="activity-card" style="text-decoration: none;">
                                    <div class="card-img-placeholder" style="background-image: url('${imageUrl}')"></div>
                                    <div class="card-content">
                                        <h3 class="card-title">${activity.activityName}</h3>
                                        <p class="card-desc">${activity.activityDesc || '這是一個超讚的體驗行程！'}</p>
                                        <div class="card-footer">
                                            <div><span class="card-discount-tag">查看詳情</span></div>
                                            <div class="card-price">特價 TWD ${activity.adultPrice || '0'}</div>
                                        </div>
                                    </div>
                                </a>
                            `;
                            gridDiv.insertAdjacentHTML('beforeend', cardHtml);
                        });

                        sectionDiv.appendChild(gridDiv);
                        container.appendChild(sectionDiv);
                    })
                    .catch(err => console.error("載入隨機活動失敗:", err));
            });
        </script>
    </section>
</body>

</html>
