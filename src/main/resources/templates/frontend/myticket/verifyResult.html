<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>票券驗證結果</title>

<style>

body{
    margin:0;
    font-family:"Microsoft JhengHei";
    background:#f5f6f8;
}

.wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:80px;
}

.result-card{

    width:520px;

    background:white;

    border-radius:12px;

    box-shadow:0 4px 15px rgba(0,0,0,.08);

    padding:40px;

    text-align:center;

}

.result-title{

    font-size:30px;

    font-weight:bold;

    margin-bottom:25px;

}

.success{

    color:#28a745;

}

.fail{

    color:#dc3545;

}

.info{

    margin-top:25px;

    text-align:left;

    line-height:38px;

    font-size:17px;

}

.info span{

    font-weight:bold;

}

.home-btn{

    display:inline-block;

    margin-top:35px;

    padding:12px 28px;

    background:#ff7a00;

    color:white;

    text-decoration:none;

    border-radius:8px;

}

.home-btn:hover{

    background:#e56f00;

}

</style>

</head>

<body>

<div class="wrapper">

    <div class="result-card">

        <div class="result-title"
             th:classappend="${message == '驗票成功'} ? 'success' : 'fail'">

            <span th:text="${message}">
                驗票成功
            </span>

        </div>

        <div class="info"
             th:if="${ticket != null}">

            <div>

                <span>票券名稱：</span>

                <span th:text="${ticket.ticketVO.ticketName}">
                </span>

            </div>

            <div>

                <span>票券序號：</span>

                <span th:text="${ticket.serialNumber}">
                </span>

            </div>

            <div>

                <span>會員：</span>

                <span th:text="${ticket.customerVO.custName}">
                </span>

            </div>

        </div>

        <a th:href="@{/customer/tickets}"
           class="home-btn">

            返回我的票券

        </a>

    </div>

</div>

</body>

</html>
