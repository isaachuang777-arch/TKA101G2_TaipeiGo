<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北GO了沒 - 客服中心 - 歷史紀錄</title>
    	<link rel="stylesheet" th:href="@{/css/footer.css}">
	<link rel="stylesheet" th:href="@{/css/cs/cs.css}">
    </head>
<body>

	<div class="main-box">
	<h2>客服中心 - 歷史紀錄</h2>
    <a th:href="@{/CustomerService/index}">
        <button type="button" style="background-color: #6c757d; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">
        返回 客服中心 首頁
        </button>
    </a>
<hr>
<span style="display: block; text-align: right; color: #888888; font-style: italic; font-size: 14px; margin-bottom: 5px;">
    以最近結案時間為排序
</span>
<div class="case-container">
    
	<a class="case-card"   th:each="cs : ${csList}" th:href="@{/CustomerService/viewmsgs(csId=${cs.csId})}" style="text-decoration: none;">
        <!-- 左邊 -->
        <div class="card-left">
            <!-- 分類 -->
            <h2 >
            <span th:if="${cs.caseCate == 11}" >操作問題</span>
            <span th:if="${cs.caseCate == 12}" >訂單問題</span>
            <span th:if="${cs.caseCate == 13}" >其他問題</span></h2>
            <!-- 狀態 -->
            <span>
		    <span th:if="${cs.caseStatus == 0}"  style="background-color: #ff8b8b90; opacity: .9; color: white; padding: 4px 10px; border: none; border-radius: 12px; ">新增</span>
            <span th:if="${cs.caseStatus == 1}" style="background-color: #feffaa90; color: white; padding: 4px 10px; border: none; border-radius: 12px;  ">待處理</span>
            <span th:if="${cs.caseStatus == 2}" style="background-color: #96ffed90; color: white; padding: 4px 10px; border: none; border-radius: 12px; ;">已回覆</span>
            <span th:if="${cs.caseStatus == 3}" style="background-color: #ff5b0095; color: white; padding: 4px 7px; border: none; border-radius: 12px; ;">已結案</span>
            </span>

        </div>
     
        <!-- 右邊 -->
        <div class="card-right">
            <!-- 時間 -->
            <span class="time-text" th:text="|結案於 ${#dates.format(cs.resolvedAt, 'yyyy-MM-dd HH:mm')}|"></span>
        </div>
        </a>
    </div>
</div>

   <!-- Footer -->
    <div class="footer"th:replace="~{frontend/index/footer :: footer}"></div>
</body>
</html>
