<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北GO了沒 - 客服中心 - 追蹤進度</title>
    <link rel="stylesheet" th:href="@{/css/footer.css}">
<link rel="stylesheet" th:href="@{/css/cs/cs.css}">
 
</head>
<body>
<div class="main-box">
<h2>客服中心</h2>

<br>
<div>
    <div th:if="${caseData.caseStatus != 3}" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
            <a th:href="@{/CustomerService/ActiveCase}">
        <button type="button" style="background-color: #6c757d; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">
        返回 追蹤進度
        </button>
    </a>
        <form th:action="@{/CustomerService/custClosecase}" method="post" onsubmit="return confirm('您確定要結案嗎？結案後將無法再新增回覆喔！');" style="margin: 0;">
        
        <input type="hidden" name="csId" th:value="${caseData.csId}">
        
        <button type="submit" style="background-color: #4CD964; color: rgb(32, 32, 32); padding: 5px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            <h4 style="margin: 5px;" >✅此問題已解決</h4>
        </button>
        
    </form>
    </div>
    <div th:if="${caseData.caseStatus == 3}">
        <a th:href="@{/CustomerService/InactiveCase}">
        <button type="button" style="background-color: #6c757d; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer;">
        返回 歷史紀錄
        </button>
    </a>
    </div>

   </div>
       <div th:if="${successMsg}" style="background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 15px; margin-bottom: 20px; border-radius: 5px; position: relative;">
        <span th:text="${successMsg}"></span>
        <button type="button" onclick="this.parentElement.style.display='none';" style="position: absolute; right: 10px; top: 12px; background: none; border: none; cursor: pointer; font-size: 16px;">✖</button>
    </div>
    <div th:if="${errorMsg != null}" style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 1px 15px; margin-bottom: 15px; border-radius: 5px; position: relative; " >
        <p th:text="${errorMsg}"></p>
    </div>
<hr>
    
    <!-- th:each-->
    <div   th:object=" ${caseData}">
        
		 <h2>案件分類：
            <span th:if="${caseData.caseCate == 11}" >操作問題</span>
            <span th:if="${caseData.caseCate == 12}" >訂單問題</span>
            <span th:if="${caseData.caseCate == 13}" >其他問題</span></h2>
			</h2>
		    <p>目前的狀態：
		    <span th:if="${caseData.caseStatus == 0}"  style="background-color: #ff8b8b90; color: white; padding: 4px 10px; border: none; border-radius: 12px; ">新增</span>
            <span th:if="${caseData.caseStatus == 1}" style="background-color: #039e3f90; color: white; padding: 4px 10px; border: none; border-radius: 12px;  ">待處理</span>
            <span th:if="${caseData.caseStatus == 2}" style="background-color: #0089b390; color: white; padding: 4px 10px; border: none; border-radius: 12px; ;">已回覆</span>
            <span th:if="${caseData.caseStatus == 3}" style="background-color: #ff5b0095; color: white; padding: 4px 7px; border: none; border-radius: 12px; ;">已結案</span>
		    </p>
		    
		    
		    <h3>對話紀錄</h3>
            
        <div class="msg-box" th:each="msg : ${csMsg}" th:classappend="|msg-align-${msg.senderType}|">
            <p>
            <!--senderType-->
            <span th:switch="${msg.senderType}">
			    <strong th:case="0" th:text="${caseData.customerVO.custAccount}">使用者帳號</strong>
			    <strong th:case="1" >客服專員</strong>
			    <strong th:case="3" style="color: gray;">【系統提示】</strong>
            </span>
            <!--日期-->
            <span style="color: gray; font-size: 12px;" th:text="${#dates.format(msg.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            <div class="bubble" th:text="${msg.msgContent}">
            留言
            </div>
        </div>
    </div>
</div>
<!--回覆 如果不是已經結案-->
<div class="reply-box" th:if="${caseData.caseStatus != 3}">
    
    <form th:action="@{/CustomerService/custReply}" method="post" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: flex-end;">
        
        <input type="hidden" name="csId" th:value="${caseData.csId}">
        
        
            <textarea name="msg" cols="100" rows="10" placeholder="請輸入您的回覆..." style="text-align:right; border-radius: 8px; padding: 10px; resize : none;"></textarea>
            <!--TODO之後的圖片上傳-->
            <!-- 送出 -->
            <button type="submit" style="background-color: #f05a28; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-top: 10px; ">送出回覆</button>
        
    </form>
    
</div>
<!--  -->
<div th:if="${caseData.caseStatus == 3}" class="noreply" style="text-align: center;">
    此案件已結案，無法再新增回覆。若有其他問題，請建立新的客服查詢。
</div>

   <!-- Footer -->
    <div th:replace="~{frontend/index/footer :: footer}"></div>
</body>
</html>
