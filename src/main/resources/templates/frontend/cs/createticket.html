<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>台北GO了沒 - 客服中心 - 提出新詢問</title>
<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">
<link rel="stylesheet" th:href="@{/css/cs/cs.css}">
<link rel="stylesheet" th:href="@{/css/index/header.css}">
<link rel="stylesheet" th:href="@{/css/index/heroSearch.css}">
<link rel="stylesheet" th:href="@{/css/index/footer.css}">
<link rel="stylesheet" th:href="@{/css/index/heroBanner.css}">
<style>
/* 自訂上傳按鈕 */
.file-upload-wrapper {
    display: flex; align-items: center; gap: 12px; margin-top: 5px;
}
.file-upload-btn {
    display: inline-block; padding: 10px 16px; background-color: #fff;
    border: 1px solid #dcdcdc; border-radius: 8px; color: #333;
    font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s ease;
}
.file-upload-btn:hover {
    background-color: #fff7ed; color: #ff7a00; border-color: #ffdda1;
}
.file-upload-btn i { margin-right: 6px; }
.file-upload-text { 
    font-size: 14px; color: #666; 
    max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block;
}
input[type="file"].hidden-upload { display: none; }
</style>
</head>
<body>
<div th:replace="~{frontend/index/header :: header}"></div>

<div class="customer-container">
    <div th:replace="~{frontend/customer/fragments/sidebar :: customerSidebar}"></div>
    
    <div class="customer-content">
        <div class="main-box">
            <h2>客服中心 - 提出新詢問</h2>

            <div style="margin-bottom: 20px;">
                <a th:href="@{/CustomerService/index}" class="btn-brand">返回客服中心首頁</a>
            </div>

            <div style="color: var(--text-muted); margin-bottom: 15px;">請填寫以下資料，便於客服人員理解您的狀況。</div>
                        <div th:if="${successMsg}" style="background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 15px; margin-bottom: 20px; border-radius: 5px; position: relative;">
                <span th:text="${successMsg}"></span>
                <button type="button" onclick="this.parentElement.style.display='none';" style="position: absolute; right: 10px; top: 12px; background: none; border: none; cursor: pointer; font-size: 16px;">✖</button>
            </div>
            
            <div th:if="${errorMsg != null}" style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
                <p th:text="${errorMsg}" style="margin: 0;"></p>
            </div>
            <form th:action="@{/CustomerService/createticket}" method="post" enctype="multipart/form-data">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px;">問題分類</label>
                    <select name="caseCate" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #dcdcdc; font-size: 15px;"> 
					    <option value="11" th:selected="${caseCate == 11}">操作問題</option>
					    <option value="12" th:selected="${caseCate == 12}">訂單問題</option>
					    <option value="13" th:selected="${caseCate == 13}">其他問題</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px;">詳細問題</label>
                    <textarea name="msg"  th:text="${msg}" rows="10" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #dcdcdc; font-size: 15px; resize: vertical; box-sizing: border-box;"></textarea>
                </div>
                <div style="margin-bottom: 20px;">
				    <label style="display: block; font-weight: bold; margin-bottom: 8px;">上傳圖片 (選填)</label>
				    <div class="file-upload-wrapper">
                        <label class="file-upload-btn">
                            <i class="fa-solid fa-cloud-arrow-up"></i> 選擇圖片
                            <input type="file" name="uploadImg" accept="image/*" class="hidden-upload" onchange="this.parentElement.nextElementSibling.textContent = this.files[0] ? this.files[0].name : '未選擇任何檔案'">
                        </label>
                        <span class="file-upload-text">未選擇任何檔案</span>
                    </div>
				</div>
                <div style="text-align: right;">
                    <button type="submit" class="btn-brand">送出問題</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{frontend/index/footer :: footer}"></div>
</body>
</html>
