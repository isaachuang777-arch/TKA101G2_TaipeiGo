<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<header th:fragment="header">
    <nav class="navbar">
        <div class="nav-left">
            <a th:href="@{/}" class="nav-logo"> 台北GO了沒 </a>
        </div>

        <div class="nav-right">
            <a th:href="@{/favorite}" class="nav-link">❤️ 我的最愛 </a>
			<a th:href="@{/frontend/cart/shoppingCart}" class="nav-link cart-link">
		   		<span class="cart-icon">🛒</span>
		    	<span class="cart-text">購物車</span>
				<span id="cartCount" class="cart-badge"></span>	
			</a>
				
            <!-- 未登入 -->
            <th:block th:if="${session.loginCustomer == null}">
                <a th:href="@{/auth/login}" class="btn-login"> 👤 登入 </a>
                <a th:href="@{/auth/register}"   class="btn-register">  👥 註冊  </a>
            </th:block>

            <!-- 已登入 -->
            <th:block th:if="${session.loginCustomer != null}">
                <div class="member-dropdown">
                    <button type="button" class="member-btn">
                        <span class="member-avatar">  👤 </span>
                        <span class="member-name" th:text="${session.loginCustomer.custName}"> </span>
                        <span class="arrow"> ▼ </span>
                    </button>

                    <div class="dropdown-menu">
                        <a th:href="@{/customer/center}">👤 會員中心</a>
                        <a th:href="@{/customer/profile}"> 📋 個人資料 </a>
                        <a th:href="@{/frontend/customer/orders}"> 📄 我的訂單  </a>
                        <a th:href="@{/customer/tickets}"> 🎫 我的票券</a>
						<a th:href="@{/CustomerService/}"> 🎧 客服中心</a>
                    </div>
                </div>
                <a th:href="@{/auth/logout}"  class="logout-link"> 🚪 登出 </a>
            </th:block>
        </div>
    </nav>
</header>
<script th:src="@{/js/header.js}"></script>
</body>
</html>
