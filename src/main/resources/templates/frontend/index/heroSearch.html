<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<section th:fragment="heroSearch">

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1 class="hero-title">
                探索你的台北
            </h1>

            <p class="hero-subtitle">
                訂門票、找行程，一站搞定！深度台北旅行就要從 台北GO了沒 開始！
            </p>

            <div class="search-box">

                <input
                    type="text"
                    class="search-input"
                    placeholder="臺北市立動物園 TAIPEI ZOO">

                <button class="search-btn">
                    搜尋
                </button>

            </div>

        </div>

    </section>

</section>

</body>

</html>
