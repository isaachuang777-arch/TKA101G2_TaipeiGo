<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>修改密碼</title>

<style>
.container {
    display: flex;
    max-width: 1200px;
    margin: 30px auto;
}

.content {
    flex: 1;
    padding: 30px;
}

.info-row {
    margin-bottom: 15px;
}
</style>

</head>
<body>

<div class="container">

    <div th:replace="~{frontend/customer/fragments/sidebar :: customerSidebar}"></div>

    <div class="content">

        <h2>修改密碼</h2>

        <p>
            歡迎，
            <span th:text="${loginCustomer.custName}"></span>
        </p>

        <form>

            <div class="info-row">
                舊密碼：
                <input type="password">
            </div>

            <div class="info-row">
                新密碼：
                <input type="password">
            </div>

            <div class="info-row">
                確認新密碼：
                <input type="password">
            </div>

            <button type="submit">
                修改密碼
            </button>

        </form>

    </div>

</div>

</body>
</html>
