<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>我的最愛</title>

<link rel="stylesheet" th:href="@{/css/index/header.css}">
<link rel="stylesheet" th:href="@{/css/index/footer.css}">

<style>
body {
    margin: 0;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background: #f5f6f8;
}

.favorite-container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 24px;
}

.favorite-title {
    font-size: 28px;
    margin-bottom: 24px;
}

.empty-box {
    background: #fff;
    border-radius: 14px;
    padding: 48px;
    text-align: center;
    color: #666;
}

.favorite-card {
    display: flex;
    gap: 20px;
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.favorite-img {
    width: 220px;
    height: 140px;
    object-fit: cover;
    border-radius: 12px;
    background: #eee;
}

.favorite-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.favorite-name {
    font-size: 20px;
    font-weight: bold;
    margin: 4px 0 16px;
    color: #222;
}

.favorite-actions {
    display: flex;
    gap: 12px;
    align-items: center;
}

.detail-link {
    display: inline-block;
    padding: 9px 18px;
    border-radius: 8px;
    background: #ff5a1f;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
}

.remove-btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
}

.remove-btn:hover {
    background: #f7f7f7;
}
</style>
</head>

<body>

<div th:replace="~{frontend/index/header :: header}"></div>

<div class="favorite-container">

    <h2 class="favorite-title">我的最愛</h2>

    <div class="empty-box" th:if="${#lists.isEmpty(favoriteList)}">
        目前沒有任何收藏
    </div>

    <div class="favorite-card" th:each="favorite : ${favoriteList}">

        <img class="favorite-img"
             th:if="${favorite.imageUrl != null and favorite.imageUrl != ''}"
             th:src="${favorite.imageUrl}"
             alt="商品圖片">

        <div class="favorite-info">

            <div>
                <div class="favorite-name" th:text="${favorite.productName}"></div>
            </div>

            <div class="favorite-actions">

                <a class="detail-link"
                   th:if="${favorite.productType == 'ACTIVITY'}"
                   th:href="@{/activity/detail(activityId=${favorite.itemId})}">
                    查看詳情
                </a>

                <a class="detail-link"
                   th:if="${favorite.productType == 'TICKET'}"
                   th:href="@{/ticket/detail(ticketId=${favorite.itemId})}">
                    查看詳情
                </a>

                <form th:action="@{/favorite/toggle}" method="post">
                    <input type="hidden" name="type" th:value="${favorite.productType}">
                    <input type="hidden" name="id" th:value="${favorite.itemId}">
                    <button class="remove-btn" type="submit">❤️ 取消收藏</button>
                </form>

            </div>

        </div>

    </div>

</div>
<div th:replace="~{frontend/index/footer :: footer}"></div>

<script th:src="@{/js/index/header.js}"></script>
</body>
</html>
