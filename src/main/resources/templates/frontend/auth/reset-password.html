<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
<meta charset="UTF-8">
<title>重設密碼</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" th:href="@{/css/index/header.css}">
<link rel="stylesheet" th:href="@{/css/index/footer.css}">

<style>
body {
    margin: 0;
    background: #f6f7fb;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.reset-wrapper {
    min-height: 620px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
}

.reset-card {
    width: 420px;
    background: #fff;
    border-radius: 14px;
    padding: 36px 40px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.reset-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #222;
}

.reset-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 28px;
    font-size: 14px;
}

.error-message {
    background: #fff1f2;
    color: #dc3545;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 600;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}

.password-wrapper {
    position: relative;
}

.password-wrapper input {
    width: 100%;
    padding: 12px 46px 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
}

.password-wrapper input:focus {
    outline: none;
    border-color: #ff7a00;
}

.toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    cursor: pointer;
    color: #888;
    font-size: 18px;
}

.toggle-password:hover {
    color: #ff7a00;
}

.password-tip {
    font-size: 12px;
    color: #777;
    margin-top: -8px;
    margin-bottom: 16px;
    line-height: 1.6;
}

.btn-submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #ff7a00;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
}

.btn-submit:hover {
    background: #e86f00;
}

.back-link {
    margin-top: 22px;
    text-align: center;
    font-size: 14px;
}

.back-link a {
    color: #ff7a00;
    text-decoration: none;
    font-weight: 700;
}
</style>

</head>

<body>

<div th:replace="~{frontend/index/header :: header}"></div>

<div class="reset-wrapper">

    <div class="reset-card">

        <div class="reset-title">
            重設密碼
        </div>

        <div class="reset-subtitle">
            請設定您的新密碼
        </div>

        <div th:if="${errorMessage}" class="error-message">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/auth/reset-password}" method="post">

            <input type="hidden"
                   name="token"
                   th:value="${token}">

            <div class="form-group">
                <label>新密碼</label>

                <div class="password-wrapper">
                    <input type="password"
                           id="newPassword"
                           name="newPassword"
                           placeholder="請輸入新密碼"
                           required>

                    <button type="button"
                            class="toggle-password"
                            onclick="togglePassword('newPassword','icon1')">

                        <i id="icon1" class="bi bi-eye"></i>

                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>確認新密碼</label>

                <div class="password-wrapper">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="請再次輸入新密碼"
                           required>

                    <button type="button"
                            class="toggle-password"
                            onclick="togglePassword('confirmPassword','icon2')">

                        <i id="icon2" class="bi bi-eye"></i>

                    </button>
                </div>
            </div>

            <div class="password-tip">
                密碼需 8~20 字元，且包含大寫、小寫英文字母及數字。
            </div>

            <button class="btn-submit" type="submit">
                確認重設密碼
            </button>

        </form>

        <div class="back-link">
            <a th:href="@{/auth/login}">
                返回登入
            </a>
        </div>

    </div>

</div>

<div th:replace="~{frontend/index/footer :: footer}"></div>

<script>
function togglePassword(inputId, iconId){

    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if(input.type==="password"){
        input.type="text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }else{
        input.type="password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }

}
</script>

</body>
</html>
