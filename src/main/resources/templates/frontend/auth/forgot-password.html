<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
<meta charset="UTF-8">
<title>忘記密碼</title>

<link rel="stylesheet" th:href="@{/css/index/header.css}">
<link rel="stylesheet" th:href="@{/css/index/footer.css}">

<style>
body {
    margin: 0;
    background: #f6f7fb;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.forgot-wrapper {
    min-height: 620px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
}

.forgot-card {
    width: 420px;
    background: #fff;
    border-radius: 14px;
    padding: 36px 40px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.forgot-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #222;
}

.forgot-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 28px;
    font-size: 14px;
    line-height: 1.7;
}

.error-message {
    background: #fff1f2;
    color: #dc3545;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 600;
}

.success-message {
    background: #eafaf1;
    color: #198754;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 600;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: #ff7a00;
}

.btn-submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #ff7a00;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
}

.btn-submit:hover {
    background: #e86f00;
}

.back-link {
    margin-top: 22px;
    text-align: center;
    font-size: 14px;
}

.back-link a {
    color: #ff7a00;
    text-decoration: none;
    font-weight: 700;
}
</style>

</head>

<body>

<div th:replace="~{frontend/index/header :: header}"></div>

<div class="forgot-wrapper">

    <div class="forgot-card">

        <div class="forgot-title">
            忘記密碼
        </div>

        <div class="forgot-subtitle">
            請輸入您註冊時使用的電子信箱，<br>
            我們將寄送重設密碼連結給您。
        </div>

        <div th:if="${errorMessage}" class="error-message">
            <span th:text="${errorMessage}"></span>
        </div>

        <div th:if="${successMessage}" class="success-message">
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/auth/forgot-password}" method="post">

            <div class="form-group">
                <label>電子信箱</label>
                <input type="email"
                       name="email"
                       placeholder="請輸入電子信箱"
                       required>
            </div>

            <button type="submit" class="btn-submit">
                寄送重設密碼信
            </button>

        </form>

        <div class="back-link">
            <a th:href="@{/auth/login}">
                返回登入
            </a>
        </div>

    </div>

</div>

<div th:replace="~{frontend/index/footer :: footer}"></div>

</body>
</html>
