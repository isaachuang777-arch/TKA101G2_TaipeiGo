<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>會員註冊</title>

<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">

<style>
body {
    margin: 0;
    background: #f6f7fb;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.register-wrapper {
    min-height: 720px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
}

.register-card {
    width: 760px;
    background: #fff;
    border-radius: 14px;
    padding: 36px 40px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.register-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #222;
}

.register-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 28px;
    font-size: 14px;
}

.error-box {
    background: #fff1f2;
    color: #dc3545;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 22px;
    font-size: 14px;
    font-weight: 600;
}

.error-box ul {
    margin: 0;
    padding-left: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 24px;
}

.form-group {
    margin-bottom: 0;
}

.form-group.full {
    grid-column: 1 / 3;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
    background: #fff;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #ff7a00;
}

.password-hint {
    margin-top: 6px;
    font-size: 13px;
    color: #888;
}

.btn-register-submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #ff7a00;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 28px;
}

.btn-register-submit:hover {
    background: #e86f00;
}

.login-link {
    margin-top: 22px;
    text-align: center;
    font-size: 14px;
    color: #666;
}

.login-link a {
    color: #ff7a00;
    text-decoration: none;
    font-weight: 700;
}
</style>

</head>
<body>

<div th:replace="~{frontend/index/header :: header}"></div>

<div class="register-wrapper">

    <div class="register-card">

        <div class="register-title">
            會員註冊
        </div>

        <div class="register-subtitle">
            加入台北GO了沒，開始探索台北旅程
        </div>

        <div th:if="${errorMsg}" class="error-box">
            <span th:text="${errorMsg}"></span>
        </div>


        <form th:action="@{/auth/register}"
			      th:object="${customerVO}"
			      method="post"
			      novalidate>
              
            <div th:if="${#fields.hasAnyErrors()}" class="error-box">
	            <ul>
	                <li th:each="err : ${#fields.errors('*')}"
	                    th:text="${err}">
	                </li>
	            </ul>
	        </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>姓名</label>
                    <input type="text"
                           th:field="*{custName}"
                           placeholder="請輸入姓名">
                </div>

                <div class="form-group">
                    <label>性別</label>
                    <select th:field="*{custSex}">
                        <option value="">請選擇</option>
                        <option value="m">男</option>
                        <option value="f">女</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>電話</label>
                    <input type="text"
                           th:field="*{custTel}"
                           placeholder="09xxxxxxxx">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text"
                           th:field="*{custEmail}"
                           placeholder="example@email.com">
                </div>

                <div class="form-group full">
                    <label>地址</label>
                    <input type="text"
                           th:field="*{custAddress}"
                           placeholder="請輸入地址">
                </div>

                <div class="form-group">
                    <label>身分證字號</label>
                    <input type="text"
                           th:field="*{custIdCard}"
                           placeholder="A123456789">
                </div>

                <div class="form-group">
                    <label>生日</label>
                    <input type="date"
                           th:field="*{custBirthday}">
                </div>

                <div class="form-group">
                    <label>帳號</label>
                    <input type="text"
                           th:field="*{custAccount}"
                           placeholder="6~20位英文或數字">
                </div>

                <div class="form-group">
                    <label>密碼</label>
                    <input type="password"
                           th:field="*{custPassword}"
                           placeholder="請輸入密碼">
                    <div class="password-hint">
                        密碼需 8~20 字元，且包含大寫、小寫英文字母及數字。
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-register-submit">
                註冊
            </button>

        </form>

        <div class="login-link">
            已經有帳號？
            <a th:href="@{/auth/login}">
                立即登入
            </a>
        </div>

    </div>

</div>

<div th:replace="~{frontend/index/footer :: footer}"></div>

</body>
</html>
