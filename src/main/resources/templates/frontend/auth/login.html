<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<head>
<meta charset="UTF-8">
<title>會員登入</title>

<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">

<style>
body {
    margin: 0;
    background: #f6f7fb;
    font-family: Arial, "Microsoft JhengHei", sans-serif;
}

.login-wrapper {
    min-height: 620px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
}

.login-card {
    width: 420px;
    background: #fff;
    border-radius: 14px;
    padding: 36px 40px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.login-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #222;
}

.login-subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 28px;
    font-size: 14px;
}

.error-message {
    background: #fff1f2;
    color: #dc3545;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 600;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: #ff7a00;
}

.btn-login-submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: #ff7a00;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
}

.btn-login-submit:hover {
    background: #e86f00;
}

.register-link {
    margin-top: 22px;
    text-align: center;
    font-size: 14px;
    color: #666;
}

.register-link a {
    color: #ff7a00;
    text-decoration: none;
    font-weight: 700;
}

.success-message {
    background: #eafaf1;
    color: #198754;
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 600;
}

</style>

</head>

<body>

<div th:replace="~{frontend/index/header :: header}"></div>

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-title">
            會員登入
        </div>

        <div class="login-subtitle">
            歡迎來到台北GO了沒
        </div>

        <div th:if="${errorMsg}" class="error-message">
            <span th:text="${errorMsg}"></span>
        </div>
        
        <div th:if="${successMsg}" class="success-message">
		    <span th:text="${successMsg}"></span>
		</div>

        <form th:action="@{/auth/login}" method="post">

            <div class="form-group">
                <label>帳號</label>
                <input type="text"
                       name="custAccount"
                       placeholder="請輸入帳號">
            </div>

            <div class="form-group">
                <label>密碼</label>
                <input type="password"
                       name="custPassword"
                       placeholder="請輸入密碼">
            </div>

            <button type="submit" class="btn-login-submit">
                登入
            </button>

        </form>

        <div class="register-link">
            還沒有帳號？
            <a th:href="@{/auth/register}">
                立即註冊
            </a>
        </div>

    </div>

</div>

<div th:replace="~{frontend/index/footer :: footer}"></div>

</body>
</html>
