<style>

#container {
    max-width: 800px; 
    margin: 40px auto;
    padding: 0 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

h1 center {
    color: #333;
    font-weight: bold;
    margin-bottom: 10px;
}

/* 分類區塊標題 */
.faqcatblock h3 {
    color: #333;
    font-size: 1.4rem;
    margin-top: 3rem;
    margin-bottom: 1.2rem;
    padding-bottom: 8px;
    border-bottom: 2px solid #eee; 
    position: relative;
}


.faqcatblock h3::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 60px;
    height: 2px;
    background-color: #f05a28;
}

/* 每個 FAQ 的外觀 */
details {
    margin-bottom: 12px;
    border: 1px solid #eaeaea; 
    border-radius: 8px; 
    background-color: #fff;
    overflow: hidden;
    transition: all 0.3s ease; 
}


details[open] {
    border-color: #f05a28; 
    box-shadow: 0 4px 12px rgba(240, 90, 40, 0.1); 
}


summary {
    padding: 16px 20px; 
    font-size: 1.05rem;
    color: #333;
    cursor: pointer; 
    background-color: #fff;
    font-weight: 500;
    transition: background-color 0.2s ease, color 0.2s ease;
    
    /* 隱藏預設三角形改用 Flex 排版 */
    list-style: none; 
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 隱藏 Safari 的預設三角形 */
summary::-webkit-details-marker {
    display: none; 
}

/* 滑鼠移過去的效果 */
summary:hover {
    background-color: #fff6f3; 
    color: #f05a28; 
}

summary::after {
    content: '+';
    color: #f05a28;
    font-size: 1.4rem;
    font-weight: 300;
    transition: transform 0.3s ease;
}

/* 展開時加號會旋轉變成減號 */
details[open] summary::after {
    content: '−';
    transform: rotate(180deg);
}


details p {
    padding: 16px 20px;
    margin: 0;
    color: #555;
    line-height: 1.6;
    background-color: #fafafa; 
    border-top: 1px solid #eaeaea;
}
</style>
<br>
<br>
<H1 ><center>常見問題</center></H1>
<div id="container"></div>
<script>
    //API網址
     const apiUrl = '/FAQ/api/all'; 

	//fetch(API).然後function是 return json格式
    fetch(apiUrl).then(function(response) {
            return response.json(); 
            
        }).then(function(faqList) {
			//先做各個分類的空列陣
           let groupedFaqs ={
       		   "訂單與付款":[],
       		   "票券使用":[],
       		   "帳號與會員":[],
       		   "活動與門票":[],
        		"其他":[]
			};
			//做對照表
        const categoryMap = {
            1: "訂單與付款",
            2: "票券使用",
            3: "帳號與會員",
            4: "活動與門票",
            5: "其他"
        };
	//分類Loop
	for (let i =0;i< faqList.length;i++){
		//拿出faq
		let faq = faqList[i];
		//拿出分類的值
		let catNum = faq.category;
		//依對照表找到對應的陣列  分類名字 = 對照表[數字//用DB傳來的]
		let categoryName= categoryMap[catNum];
		//防呆 怕後端傳來6是會報錯 
		//把faq塞進陣列
		if(categoryName){
			groupedFaqs[categoryName].push(faq);
		}
		}
	//空白的Html
	let htmlContent = '';
	//用分類名字(categoryName)來loop 各已分類好的faq(groupedFaqs)
	for(let categoryName in groupedFaqs){
		//先把分類名字放進div 
		htmlContent +=`
		<div class ="faqcatblock">
		<h3>${categoryName}</h3>
		`;
		//在分類裡的Faq
		let faqsInCategory = groupedFaqs[categoryName];
		
		//用Loop把faq拿出來
		for(let j = 0; j<faqsInCategory.length;j++){
			let faq = faqsInCategory[j];
			
			//寫Html
			htmlContent += 
				` 
				<details>
				<summary>${faq.title}</summary>
				<p>${faq.content}</p>
				</details>
				`;
		}
		htmlContent += `</div> `;
	}
	//放到一個叫container的id 
        document.getElementById('container').innerHTML = htmlContent;
    }).catch(function(error) {
        console.log("發生錯誤了：", error);
    });
</script>
