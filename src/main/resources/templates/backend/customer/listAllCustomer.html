<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員管理 - TaipeiGo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0a58ca;
            --success: #198754;
            --danger: #dc3545;
            --warning: #fd7e14;
            --sidebar-width: 240px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f0f4f8;
            margin: 0;
        }

        .main-wrap {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2236;
        }

        .topbar-title span {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .content-area {
            padding: 32px;
            flex: 1;
        }

        .stats-row {
            margin-bottom: 28px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8edf2;
            height: 100%;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-icon.blue { background: #eff6ff; color: #3b82f6; }
        .stat-icon.green { background: #f0fdf4; color: #22c55e; }
        .stat-icon.orange { background: #fff7ed; color: #f97316; }

        .stat-label {
            font-size: 0.78rem;
            color: #94a3b8;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1;
        }

        .table-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8edf2;
            overflow: hidden;
        }

        .table-card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
        }

        .table-card-title span {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 400;
            margin-left: 6px;
        }

        .search-bar {
            position: relative;
            max-width: 240px;
        }

        .search-bar i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .search-bar input {
            padding-left: 32px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            height: 36px;
        }

        .search-bar input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.1);
            border-color: var(--primary);
        }

        .custom-table {
            margin: 0;
        }

        .custom-table thead th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            border-bottom: 2px solid #e8edf2;
            white-space: nowrap;
        }

        .custom-table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 0.88rem;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        .custom-table tbody tr:last-child td {
            border-bottom: none;
        }

        .custom-table tbody tr:hover td {
            background: #f8fafc;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .avatar-blue { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .avatar-green { background: linear-gradient(135deg, #22c55e, #4ade80); }
        .avatar-purple { background: linear-gradient(135deg, #a855f7, #c084fc); }
        .avatar-orange { background: linear-gradient(135deg, #f97316, #fb923c); }
        .avatar-pink { background: linear-gradient(135deg, #ec4899, #f472b6); }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-name {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.88rem;
        }

        .user-account {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-active {
            background: #f0fdf4;
            color: #16a34a;
        }

        .status-inactive {
            background: #fff1f2;
            color: #dc2626;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-active .status-dot {
            background: #16a34a;
        }

        .status-inactive .status-dot {
            background: #dc2626;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all .18s;
            border: none;
            cursor: pointer;
        }

        .btn-view { background: #eff6ff; color: #3b82f6; }
        .btn-edit { background: #fff7ed; color: #f97316; }
        .btn-delete { background: #fff1f2; color: #ef4444; }

        .btn-view:hover { background: #3b82f6; color: #fff; }
        .btn-edit:hover { background: #f97316; color: #fff; }
        .btn-delete:hover { background: #ef4444; color: #fff; }

        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 9px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: background .2s;
        }

        .btn-add:hover {
            background: var(--primary-dark);
            color: #fff;
        }

        .alert-success-custom {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .sex-badge {
            font-size: 0.78rem;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .sex-m {
            background: #eff6ff;
            color: #3b82f6;
        }

        .sex-f {
            background: #fdf4ff;
            color: #a855f7;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }

        .table-footer {
            padding: 14px 24px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .table-footer-info {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .main-wrap {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<div class="main-wrap">

    <header class="topbar">
        <div class="topbar-title">
            <i class="bi bi-people me-2" style="color:var(--primary);"></i>
            會員管理
            <span>/ 會員列表</span>
        </div>

        <a class="btn-add" th:href="@{/backend/customer/add}">
            <i class="bi bi-plus-lg"></i>
            新增會員
        </a>
    </header>

    <main class="content-area">

        <div class="alert-success-custom" th:if="${success}">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${success}"></span>
        </div>

        <div class="row stats-row g-3">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div>
                        <div class="stat-label">總會員數</div>
                        <div class="stat-value"
						     th:text="${totalItems}">
						    0
						</div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon green">
                        <i class="bi bi-person-check-fill"></i>
                    </div>
                    <div>
                        <div class="stat-label">啟用會員</div>
                        <div class="stat-value"
                             th:text="${activeCount}">
                            0
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
			    <div class="stat-card">
			        <div class="stat-icon orange">
			            <i class="bi bi-person-dash-fill"></i>
			        </div>
			        <div>
			            <div class="stat-label">未啟用會員</div>
			            <div class="stat-value"
			                 th:text="${inactiveCount}">
			                0
			            </div>
			        </div>
			    </div>
			</div>
            

            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="bi bi-person-x-fill"></i>
                    </div>
                    <div>
                        <div class="stat-label">停權會員</div>
                        <div class="stat-value"
                             th:text="${suspendedCount}">
                            0
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-card-header">
                <div class="table-card-title">
                    <i class="bi bi-list-ul me-1" style="color:var(--primary);"></i>
                    會員列表
                    <span th:text="${'共 ' + totalItems + ' 位'}"></span>
                </div>

                <div class="search-bar">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="搜尋姓名、帳號..." class="form-control">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table custom-table" id="memberTable">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>會員資訊</th>
                        <th>性別</th>
                        <th>手機</th>
                        <th>Email</th>
                        <th>狀態</th>
                        <th style="text-align:center;">操作</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${customerList == null or customerList.isEmpty()}">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <div>目前沒有任何會員資料</div>

                                <a class="btn-add mt-3 d-inline-flex" th:href="@{/backend/customer/add}">
                                    <i class="bi bi-plus-lg"></i>
                                    新增第一位會員
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:each="c, iterStat : ${customerList}">
                        <td style="color:#94a3b8; font-size:0.8rem;" th:text="${currentPage * 10 + iterStat.index + 1}"></td>

                        <td>
                            <div class="user-info">
                                <div th:with="colors=${ {'avatar-blue','avatar-green','avatar-purple','avatar-orange','avatar-pink'} }"
                                     th:class="${'avatar ' + colors[iterStat.index % 5]}"
                                     th:text="${#strings.substring(c.custName, 0, 1)}">
                                </div>

                                <div>
                                    <div class="user-name" th:text="${c.custName}"></div>
                                    <div class="user-account" th:text="${'@' + c.custAccount}"></div>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span th:if="${c.custSex == 'm' or c.custSex == 'M'}"
                                  class="sex-badge sex-m">男</span>

                            <span th:if="${c.custSex == 'f' or c.custSex == 'F'}"
                                  class="sex-badge sex-f">女</span>
                        </td>

                        <td th:text="${c.custTel}"></td>

                        <td th:text="${c.custEmail}"></td>

                        <td>
							<span th:if="${c.custStatus == 1}"
							      class="status-badge status-active">
							    <span class="status-dot"></span>
							    啟用
							</span>
							
							<span th:if="${c.custStatus == 0}"
							      class="status-badge"
							      style="background:#fff7ed;color:#ea580c;">
							    <span class="status-dot"
							          style="background:#ea580c;"></span>
							    未啟用
							</span>
							
							<span th:if="${c.custStatus == 2}"
							      class="status-badge status-inactive">
							    <span class="status-dot"></span>
							    停權
							</span>
                        </td>

                        <td style="text-align:center;">
                            <div style="display:flex; gap:6px; justify-content:center;">
                                <a class="action-btn btn-view"
                                   th:href="@{/backend/customer/view(id=${c.custId})}"
                                   title="查看詳細">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <a class="action-btn btn-edit"
                                   th:href="@{/backend/customer/edit(id=${c.custId})}"
                                   title="修改">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <a class="action-btn btn-delete"
                                   th:href="@{/backend/customer/delete(id=${c.custId})}"
                                   onclick="return confirmDelete(this)"
                                   title="刪除">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

			<div class="table-footer">
			
			    <div class="table-footer-info">
				    共 <span th:text="${totalItems}"></span> 筆資料，
				    第 <span th:text="${currentPage + 1}"></span> 頁 /
				    共 <span th:text="${totalPages}"></span> 頁
				</div>
			
			    <nav th:if="${totalPages > 1}">
			        <ul class="pagination pagination-sm mb-0">
			
			            <!-- 上一頁 -->
			            <li class="page-item"
			                th:classappend="${currentPage == 0} ? 'disabled'">
			                <a class="page-link"
			                   th:href="@{/backend/customer/list(page=${currentPage - 1})}">
			                    上一頁
			                </a>
			            </li>
			
			            <!-- 頁碼 -->
			            <li class="page-item"
			                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
			                th:classappend="${i == currentPage} ? 'active'">
			
			                <a class="page-link"
			                   th:text="${i + 1}"
			                   th:href="@{/backend/customer/list(page=${i})}">
			                </a>
			            </li>
			
			            <!-- 下一頁 -->
			            <li class="page-item"
			                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
			                <a class="page-link"
			                   th:href="@{/backend/customer/list(page=${currentPage + 1})}">
			                    下一頁
			                </a>
			            </li>
			
			        </ul>
			    </nav>
			
			</div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const searchInput = document.getElementById('searchInput');

    if (searchInput) {
        searchInput.addEventListener('input', function () {
            const keyword = this.value.toLowerCase();
            const rows = document.querySelectorAll('#memberTable tbody tr');

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });
    }

    function confirmDelete(el) {
        return confirm('確定要刪除此會員嗎？此操作無法復原。');
    }
</script>

</body>
</html>
