<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動管理列表 - TaipeiGo 後台</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/activity/backend-list.css}">

<style>
/* 繼承 Dashboard 共用基礎樣式 */
:root {
    --primary: #0d6efd;
}

body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f0f4f8;
    margin: 0;
}


.main-wrap {
    margin-left: var(--sidebar-width);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.topbar {
    background: #fff;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 0;
    z-index: 50;
}

.topbar-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #1a2236;
}

.content-area {
    padding: 32px;
    flex: 1;
}

/* 預覽連結特效 */
.preview-active {
    transition: color 0.2s;
    cursor: pointer;
}
.preview-active:hover {
    color: #0d6efd !important;
}
.preview-disabled {
    cursor: not-allowed;
    pointer-events: none; /* 徹底阻擋任何點擊事件 */
}
</style>
</head>
<body>

    <!-- 載入共用 Sidebar -->
    <th:block th:replace="~{backend/fragments/sidebar :: sidebar}"></th:block>

    <div class="main-wrap">
        
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-title">一日活動管理 <span>/ 列表</span></div>
            <div class="admin-top-info">
                <div class="admin-top-name">Admin</div>
            </div>
        </div>

        <!-- 內容區 -->
        <div class="content-area">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 mb-0 fw-bold">所有活動</h2>
                <div>
                    <button type="button" class="btn btn-outline-secondary shadow-sm me-2" onclick="openCategoryModal()">
                        <i class="bi bi-tags me-1"></i> 管理分類標籤
                    </button>
                    <a th:href="@{/backend/activity/add}" class="btn btn-primary shadow-sm">
                        <i class="bi bi-plus-lg me-1"></i> 新增活動
                    </a>
                </div>
            </div>

            <div class="row">
                <!-- 左側：搜尋條件 (Filter) -->
                <div class="col-lg-3">
                    <div class="filter-card">
                        <h5 class="fw-bold mb-3"><i class="bi bi-funnel-fill text-primary me-2"></i>搜尋條件</h5>


                        <form id ="searchForm" th:action="@{/backend/activity}" method="get">

                            <!-- 用來記住第幾頁用的 (移除 name 屬性避免一般搜尋時送出) -->
                            <input type="hidden" id="pageInput" th:value="${currentPage}">
                            
                            <!-- 活動編號 -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">活動編號</label>
                                <input type="number" name="activityId" class="form-control" placeholder="請輸入 ID" th:value="${param.activityId}">
                            </div>

                            <!-- 關鍵字 -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">關鍵字</label>
                                <input type="text" name="keyword" class="form-control" placeholder="活動名稱或描述" th:value="${param.keyword}">
                            </div>

                            <!-- 上下架狀態 -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">上架狀態</label>
                                <select name="activityStatus" class="form-select">
                                    <option value="" th:selected="${param.activityStatus == null || param.activityStatus.isEmpty()}">全部</option>
                                    <option value="1" th:selected="${param.activityStatus != null && param.activityStatus[0] == '1'}">已上架</option>
                                    <option value="0" th:selected="${param.activityStatus != null && param.activityStatus[0] == '0'}">已下架</option>
                                </select>
                            </div>

                            <!-- 活動主題 -->
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">主題分類</label>
                                <select name="cateId" class="form-select">
                                    <option value="">所有分類</option>
                                    <!-- 透過 ModelAttribute 動態取得分類 -->
                                    <th:block th:each="cate : ${activityCateList}">
                                        <option th:value="${cate.activityCateId}" 
                                                th:text="${cate.cateName}"
                                                th:selected="${param.cateId != null && param.cateId[0] == cate.activityCateId.toString()}">
                                        </option>
                                    </th:block>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">套用搜尋</button>
                            <a th:href="@{/backend/activity}" class="btn btn-light w-100 mt-2 text-muted">清除條件</a>
                        </form>
                    </div>
                </div>

                <!-- 右側：資料列表 -->
                <div class="col-lg-9">
                    <div class="card border-0 shadow-sm rounded-3">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover table-vertical-center mb-0">
                                    <thead class="table-light text-muted">
                                        <tr>
                                            <th width="80" class="ps-4">圖片</th>
                                            <th>ID / 名稱</th>
                                            <th width="120">價格</th>
                                            <th width="150" class="text-center">狀態</th>
                                            <th width="100" class="text-center pe-4">修改</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <th:block th:each="activity : ${activityList}">
                                            <tr>
                                                <td class="ps-4">
                                                    <!-- 縮圖 -->
                                                    <img th:if="${not #lists.isEmpty(activity.activityImage)}" 
                                                         th:src="${activity.activityImage[0].activityImageSrc}" 
                                                         class="activity-thumbnail" alt="thumbnail">
                                                    <img th:if="${#lists.isEmpty(activity.activityImage)}" 
                                                         th:src="@{/images/activity/default.png}" 
                                                         class="activity-thumbnail" alt="default">
                                                </td>
                                                <td style="max-width: 250px;">
                                                    <div class="text-muted small">#<span th:text="${activity.activityId}"></span></div>
                                                    <a href="#" 
                                                       class="fw-bold text-truncate d-block text-decoration-none activity-name-link" 
                                                       th:classappend="${activity.activityStatus == 1} ? 'text-dark preview-active' : 'text-muted preview-disabled'"
                                                       th:data-id="${activity.activityId}"
                                                       th:onclick="${activity.activityStatus == 1} ? |openPreviewModal(${activity.activityId}); return false;| : 'return false;'"
                                                       th:title="${activity.activityName} + (${activity.activityStatus == 1} ? ' (點擊預覽前台畫面)' : ' (已下架無法預覽)')" 
                                                       th:text="${activity.activityName}"></a>
                                                </td>
                                                <td>
                                                    <div class="text-primary fw-bold">
                                                        $ <span th:text="${activity.adultPrice}"></span>
                                                    </div>
                                                </td>
                                                <td class="text-center">
                                                    <!-- Switch 狀態切換與 Badge -->
                                                    <div class="d-flex align-items-center justify-content-center gap-2">
                                                        <!-- 純文字狀態 (無填色背景) -->
                                                        <span th:id="'status-badge-' + ${activity.activityId}" 
                                                              class="small me-1"
                                                              th:classappend="${activity.activityStatus == 1} ? 'text-dark' : 'text-muted'"
                                                              th:text="${activity.activityStatus == 1} ? '已上架' : '已下架'">
                                                        </span>
                                                        
                                                        <!-- Switch 開關 -->
                                                        <label class="status-switch m-0">
                                                            <input type="checkbox" class="toggle-status-btn"
                                                                   th:data-id="${activity.activityId}"
                                                                   th:checked="${activity.activityStatus == 1}">
                                                            <span class="status-slider"></span>
                                                        </label>
                                                    </div>
                                                </td>
                                                <td class="text-center pe-4">
                                                    <a th:href="@{/backend/activity/{id}/edit(id=${activity.activityId})}" 
                                                       class="btn btn-light action-btn text-primary" 
                                                       title="編輯">
                                                        <i class="bi bi-pencil-square"></i>
                                                    </a>
                                                </td>
                                            </tr>
                                        </th:block>
                                        
                                        <!-- 空狀態 -->
                                        <tr th:if="${#lists.isEmpty(activityList)}">
                                            <td colspan="5" class="text-center py-5 text-muted">
                                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                                找不到符合條件的活動
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <!-- 分頁區塊 -->
                            <div class="d-flex justify-content-start py-4 ps-4" th:if="${totalPage > 1}">
                                <nav aria-label="Page navigation">
                                    <ul class="pagination custom-pagination mb-0">
                                        
                                        <!-- 上一頁 -->
                                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                            <a class="page-link" href="javascript:void(0)" 
                                               th:onclick="${currentPage > 1} ? 'goToPage(' + (${currentPage} - 1) + ')' : ''">
                                               <i class="bi bi-chevron-left"></i>
                                            </a>
                                        </li>
                                        
                                        <!-- 中間數字頁碼 -->
                                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPage)}" 
                                            th:classappend="${currentPage == i} ? 'active'">
                                            <a class="page-link" href="javascript:void(0)" 
                                               th:onclick="'goToPage(' + ${i} + ')'" 
                                               th:text="${i}">1</a>
                                        </li>
                                        
                                        <!-- 下一頁 -->
                                        <li class="page-item" th:classappend="${currentPage == totalPage} ? 'disabled'">
                                            <a class="page-link" href="javascript:void(0)" 
                                               th:onclick="${currentPage < totalPage} ? 'goToPage(' + (${currentPage} + 1) + ')' : ''">
                                               <i class="bi bi-chevron-right"></i>
                                            </a>
                                        </li>
                                        
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>

            </div> <!-- End row -->
        </div>
    </div>
    <!-- 預覽前台畫面 Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-dark text-white py-2">
            <h5 class="modal-title fs-6 fw-bold"><i class="bi bi-eye me-2"></i>前台商品詳細頁預覽</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0" style="height: 80vh; background: #f8f9fa; overflow: hidden;">
            <!-- iframe 載入前台頁面 (由 JS 動態塞入 src) -->
            <iframe id="previewIframe" src="" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
          </div>
        </div>
      </div>
    </div>

    <!-- 分類管理 Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-light py-3">
            <h5 class="modal-title fs-6 fw-bold text-dark"><i class="bi bi-tags-fill me-2 text-primary"></i>管理活動分類</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0" style="max-height: 50vh; overflow-y: auto;">
            <!-- 分類列表 -->
            <ul class="list-group list-group-flush" id="categoryListContainer">
                <li class="list-group-item text-center text-muted py-4">載入中...</li>
            </ul>
          </div>
          <div class="modal-footer bg-light d-flex flex-column align-items-start p-3">
            <div class="input-group w-100">
                <label class="btn btn-outline-secondary px-3 mb-0" style="border-radius: 0; border-right: 0;" title="上傳新分類圖片">
                    <i class="bi bi-image"></i>
                    <input type="file" id="newCategoryImg" style="display: none;" accept="image/*">
                </label>
                <input type="text" class="form-control" id="newCategoryName" placeholder="輸入新分類名稱...">
                <button class="btn btn-primary px-4 fw-bold" type="button" onclick="saveNewCategory()"><i class="bi bi-plus-lg me-1"></i>新增</button>
            </div>
            <div id="categoryErrorMsg" class="text-danger small mt-2 w-100 fw-bold" style="display: none;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 核心 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/activity/backend-list.js}"></script>

    <script>
        // 打開 Modal 並載入 iframe
        function openPreviewModal(activityId) {
            document.getElementById('previewIframe').src = '/activity/detail?activityId=' + activityId + '&preview=true';
            var myModal = new bootstrap.Modal(document.getElementById('previewModal'));
            myModal.show();
        }

        // 當 modal 關閉時清空 iframe，避免背景繼續消耗資源
        document.getElementById('previewModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('previewIframe').src = '';
        });
    </script>

    <script>
        // 處理翻頁的函數
        function goToPage(pageNumber) {
            let pageInput = document.getElementById('pageInput');
            pageInput.value = pageNumber;
            pageInput.name = 'page';
            document.getElementById('searchForm').submit();
        }

        // ==========================================
        // 分類管理 Modal 邏輯
        // ==========================================
        const categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));

        function openCategoryModal() {
            document.getElementById('categoryErrorMsg').style.display = 'none';
            document.getElementById('newCategoryName').value = '';
            loadCategories();
            categoryModal.show();
        }

        // 載入所有分類
        function loadCategories() {
            const container = document.getElementById('categoryListContainer');
            container.innerHTML = '<li class="list-group-item text-center text-muted py-4"><div class="spinner-border text-primary spinner-border-sm me-2"></div>載入中...</li>';

            fetch('/backend/activity/api/cate/list')
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        container.innerHTML = '<li class="list-group-item text-center text-muted py-4">目前無任何分類</li>';
                        return;
                    }

                    container.innerHTML = '';
                    data.forEach(cate => {
                        const imgSrc = cate.cateIcon ? `data:image/jpeg;base64,${cate.cateIcon}` : '/images/activity/default.png';
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
                        li.innerHTML = `
                            <div class="d-flex align-items-center flex-grow-1 me-3">
                                <label style="cursor: pointer; position: relative;" class="me-2 mb-0" title="點擊更換圖片">
                                    <img src="${imgSrc}" id="cateImgPreview-${cate.activityCateId}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
                                    <div style="position: absolute; bottom: 0; right: 0; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px;">
                                        <i class="bi bi-pencil-fill"></i>
                                    </div>
                                    <input type="file" style="display: none;" accept="image/*" onchange="uploadCategoryImage(${cate.activityCateId}, this, document.getElementById('cateInput-${cate.activityCateId}').value, ${cate.isActive})">
                                </label>
                                <input type="text" class="form-control border-0 bg-transparent fw-bold" 
                                       id="cateInput-${cate.activityCateId}" value="${cate.cateName}" 
                                       onchange="saveCategory(${cate.activityCateId}, this.value, ${cate.isActive})"
                                       title="點擊編輯名稱，修改完點擊空白處自動儲存">
                            </div>
                            <div class="d-flex align-items-center">
                                <span id="cateBadge-${cate.activityCateId}" class="badge ${cate.isActive === 1 ? 'bg-success' : 'bg-secondary'} me-3">
                                    ${cate.isActive === 1 ? '上架中' : '已停用'}
                                </span>
                                <div class="form-check form-switch m-0 d-flex align-items-center" title="切換上架狀態">
                                    <input class="form-check-input mt-0 fs-5" style="cursor: pointer; margin-left: 0;" type="checkbox" role="switch" 
                                           ${cate.isActive === 1 ? 'checked' : ''} 
                                           onchange="toggleCategoryStatus(${cate.activityCateId})">
                                </div>
                            </div>
                        `;
                        container.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('Error fetching categories:', error);
                    container.innerHTML = '<li class="list-group-item text-center text-danger py-4">載入失敗，請稍後再試</li>';
                });
        }

        // 獨立的新增分類函式，因為要處理圖片
        function saveNewCategory() {
            const inputEl = document.getElementById('newCategoryName');
            const fileInput = document.getElementById('newCategoryImg');
            const cateName = inputEl.value.trim();
            if (!cateName) {
                document.getElementById('categoryErrorMsg').innerText = '請輸入分類名稱';
                document.getElementById('categoryErrorMsg').style.display = 'block';
                return;
            }

            const payload = { cateName: cateName, isActive: 1 };
            
            // 如果有選圖片，轉成 base64 送出
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 去掉 'data:image/jpeg;base64,' 前綴
                    const base64String = e.target.result.split(',')[1];
                    payload.cateIcon = base64String;
                    sendCategoryPayload(null, payload);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                sendCategoryPayload(null, payload);
            }
        }

        // 修改既有分類名稱
        function saveCategory(id, nameValue = null, isActive = 1) {
            const errorMsgEl = document.getElementById('categoryErrorMsg');
            errorMsgEl.style.display = 'none';

            let cateName = nameValue ? nameValue.trim() : '';
            if (!cateName) {
                loadCategories(); // 如果使用者清空，則重新載入還原
                return;
            }

            const payload = { activityCateId: id, cateName: cateName, isActive: isActive };
            sendCategoryPayload(id, payload);
        }

        // 專門處理圖片上傳
        function uploadCategoryImage(id, inputEl, currentName, isActive) {
            if (!inputEl.files || !inputEl.files[0]) return;
            
            // 先預覽圖片
            const previewEl = document.getElementById(`cateImgPreview-${id}`);
            const reader = new FileReader();
            
            // 讀取成功後發 API
            reader.onload = function(e) {
                previewEl.src = e.target.result;
                const base64String = e.target.result.split(',')[1];
                
                const payload = { 
                    activityCateId: id, 
                    cateName: currentName, 
                    isActive: isActive,
                    cateIcon: base64String
                };
                sendCategoryPayload(id, payload);
            };
            reader.readAsDataURL(inputEl.files[0]);
        }

        // 共用的送出 API
        function sendCategoryPayload(id, payload) {
            const errorMsgEl = document.getElementById('categoryErrorMsg');
            errorMsgEl.style.display = 'none';
            fetch('/backend/activity/api/cate/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text) });
                }
                return response.json();
            })
            .then(data => {
                if (id === null) {
                    document.getElementById('newCategoryName').value = ''; // 清空新增框
                    const newImgInput = document.getElementById('newCategoryImg');
                    if (newImgInput) newImgInput.value = ''; // 清空圖片
                    loadCategories(); // 重新載入列表
                } else {
                    // 只需閃一下綠色代表成功
                    const inputEl = document.getElementById(`cateInput-${id}`);
                    if(inputEl) {
                        inputEl.classList.add('is-valid');
                        setTimeout(() => inputEl.classList.remove('is-valid'), 1500);
                    }
                }
            })
            .catch(error => {
                console.error('Error saving category:', error);
                errorMsgEl.innerText = error.message;
                errorMsgEl.style.display = 'block';
                if(id !== null) loadCategories(); // 修改失敗的話，還原列表
            });
        }

        // 切換分類啟用狀態
        function toggleCategoryStatus(id) {
            fetch('/backend/activity/api/cate/toggle/' + id, {
                method: 'POST'
            })
            .then(response => {
                if (!response.ok) throw new Error('狀態切換失敗');
                return response.json();
            })
            .then(data => {
                // 成功後，不重新載入全部列表，只針對當前的 Badge 改變顏色與文字，這樣就不會閃爍！
                const badgeEl = document.getElementById('cateBadge-' + id);
                if (badgeEl) {
                    if (data.isActive === 1) {
                        badgeEl.className = 'badge bg-success me-3';
                        badgeEl.textContent = '上架中';
                    } else {
                        badgeEl.className = 'badge bg-secondary me-3';
                        badgeEl.textContent = '已停用';
                    }
                }
            })
            .catch(error => {
                console.error(error);
                loadCategories(); // 只有切換失敗（遇到 Bug 時）才重新載入以還原 Switch 狀態
            });
        }
        
        // Modal 關閉時，如果分類有變動，重新整理頁面以更新側邊的「搜尋分類下拉選單」
        document.getElementById('categoryModal').addEventListener('hidden.bs.modal', function () {
            window.location.reload();
        });
    </script>
</body>
</html>
