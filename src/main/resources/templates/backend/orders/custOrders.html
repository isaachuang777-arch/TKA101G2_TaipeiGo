<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的訂單</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.container{
    display:flex;
    max-width:1200px;
    margin:30px auto;
}

.content{
    flex:1;
    padding:30px;
}

.page-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
}

.order-table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

.order-table th{
    background:#f5f5f5;
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.order-table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.order-table tbody tr:hover{
    background:#fafafa;
}

.detail-btn{
    display:inline-block;
    padding:10px 18px;
    background:#ff7a00;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.detail-btn:hover{
    background:#e66d00;
}

.empty-box{
    padding:40px;
    text-align:center;
    color:#666;
}

.empty-box h3{
    margin-bottom:10px;
}

</style>
</head>

<body>
<div class="container">

    <!-- 左側會員選單 sidebar-->
    <div th:replace="~{frontend/customer/fragments/sidebar :: customerSidebar}"></div>

    <!-- 會員訂單內容(購買紀錄) -->
    <div class="content">
        <div class="page-title">我的訂單</div>

        <!-- 無訂單 -->
        <div class="empty-box"
             th:if="${#lists.isEmpty(orderList)}">
            <h3>目前尚無訂單</h3>
        </div>

        <!-- 訂單列表 -->
        <table class="order-table"
               th:if="${!#lists.isEmpty(orderList)}">
            <thead>
                <tr>
                    <th>訂單編號</th>
                    <th>建立日期</th>
                    <th>訂單金額</th>
                    <th>訂單狀態</th>
                    <th>付款狀態</th>
                    <th>付款方式</th>
                    <th>查看明細</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="order : ${orderList}">
                    <td th:text="${order.orderId}"> 1</td>
                    <td th:text="${#dates.format(order.createdAt,'yyyy-MM-dd')}">2026-06-01</td>
                    <td>NT$<span th:text="${order.orderTotal}">850</span></td>
                    <td th:text="${order.orderStatus}">已完成</td>
                    <td th:text="${order.paymentStatus}">已付款</td>
                    <td th:text="${order.paymentMethod}"> 信用卡</td>
                    <td><a class="detail-btn"
                           th:href="@{'/frontend/customer/orderDetail/' + ${order.orderId}}">查看明細
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>

</html>
