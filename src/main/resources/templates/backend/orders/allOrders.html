<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>訂單管理</title>

<style>
body {
	font-family: Arial, sans-serif;
	margin: 20px;
}

h2 {
	margin-bottom: 20px;
}

.search-box {
	border: 1px solid #ddd;
	border-radius: 8px;
	padding: 20px;
	margin-bottom: 20px;
	background: #fafafa;
}

.search-group {
	margin-bottom: 15px;
}

.search-group label {
	display: inline-block;
	width: 100px;
	font-weight: bold;
}

.search-group input {
	width: 250px;
	padding: 8px;
}

.search-btn{
    display:inline-block;
    padding:6px 12px;
    text-decoration:none;
    border-radius:5px;
    color:white;
    background-color:#0d6efd;
}

.search-btn:hover{
    background-color:#0b5ed7;
}

.error-msg {
	color: red;
	font-weight: bold;
	margin-bottom: 15px;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th, td {
	border: 1px solid #ddd;
	padding: 10px;
	text-align: center;
}

th {
	background: #f5f5f5;
}

.btn {
	padding: 6px 12px;
	border-radius: 5px;
	text-decoration: none;
	color: white;
}

.btn-view {
	background: #0d6efd;
}
</style>

</head>

<body>

	<h2>訂單管理</h2>

	<div class="error-msg" th:if="${errorMessage}"
		th:utext="${errorMessage}"></div>

	<div class="search-box">

		<!-- 訂單編號查詢 -->

		<form th:action="@{/orders/search_ordersId}" method="post">

			<div class="search-group">

				<label>訂單編號</label> <input type="text" name="ordersId"
					placeholder="請輸入訂單編號">

				<button type="submit" class="search-btn">查詢</button>

			</div>

		</form>

		<!-- 會員編號查詢 -->

		<form th:action="@{/orders/search_custId}" method="post">

			<div class="search-group">

				<label>會員編號</label> <input type="text" name="custId"
					placeholder="請輸入會員編號">

				<button type="submit" class="search-btn">查詢</button>

			</div>

		</form>

		<div style="margin-top: 15px;">

			<a th:href="@{/orders}" class="search-btn"> 顯示全部 </a>

		</div>

	</div>

	<table>

		<thead>

			<tr>

				<th>訂單編號</th>
				<th>會員編號</th>
				<th>訂單總額</th>
				<th>訂單狀態</th>
				<th>付款狀態</th>
				<th>付款方式</th>
				<th>建立時間</th>
				<th>明細確認</th>

			</tr>

		</thead>

		<tbody>

			<tr th:each="order : ${allOrders}">

				<td th:text="${order.orderId}"></td>

				<td th:text="${order.custId}"></td>

				<td th:text="${order.orderTotal}"></td>

				<td th:text="${order.orderStatus}"></td>

				<td th:text="${order.paymentStatus}"></td>

				<td th:text="${order.paymentMethod}"></td>

				<td th:text="${order.createdAt}"></td>

				<td><a class="btn btn-view"
					th:href="@{/orderDetail/{id}(id=${order.orderId})}"> 查看明細 </a></td>

			</tr>

		</tbody>

	</table>

</body>
</html>
