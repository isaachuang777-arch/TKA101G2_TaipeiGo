<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增商品 - TaipeiGo 後台</title>

<!-- 共用 Bootstrap & Fonts -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* 專屬側邊欄動畫覆蓋 */
:root { --primary: #0d6efd; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4f8; margin: 0; }
.sidebar { width: 260px !important; transform: translateX(calc(-100% + 15px)); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.sidebar:hover { transform: translateX(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) 0.5s; }
.main-wrap { margin-left: 0 !important; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; min-height: 100vh; display: flex; flex-direction: column; }
.sidebar:hover ~ .main-wrap { margin-left: 260px !important; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1) 0.5s !important; }
.sidebar::after { content: ''; position: fixed; right: 4px; top: 50%; transform: translateY(-50%); width: 4px; height: 40px; background: rgba(255,255,255,0.3); border-radius: 4px; transition: opacity 0.3s; }
.sidebar:hover::after { opacity: 0; transition: opacity 0.3s 0.5s; }
.topbar { background: #fff; padding: 14px 40px 14px 80px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 1.1rem; font-weight: 700; color: #1a2236; }
.content-area { padding: 32px 40px 32px 80px; flex: 1; }
</style>
</head>
<body>

    <th:block th:replace="~{backend/fragments/sidebar :: sidebar}"></th:block>

    <div class="main-wrap">
        <div class="topbar">
            <div class="topbar-title">商品總表管理 <span>/ 新增商品</span></div>
            <div class="admin-top-info"><div class="admin-top-name">Admin</div></div>
        </div>

        <div class="content-area">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center">
                    <h2 class="h4 mb-0 fw-bold me-2">新增商品</h2>
                    <div class="form-check form-switch mb-0 d-flex align-items-center ms-3">
                        <input class="form-check-input fs-5 m-0" style="cursor: pointer;" type="checkbox" role="switch" id="statusSwitch" checked>
                        <label class="form-check-label ms-2 fw-bold text-primary mb-0" style="cursor: pointer; padding-top: 2px;" for="statusSwitch" id="statusLabel">上架中</label>
                    </div>
                </div>
                <a th:href="@{/backend/product}" class="btn btn-outline-secondary shadow-sm">
                    <i class="bi bi-arrow-left me-1"></i> 返回列表
                </a>
            </div>

            <!-- 若有 BindingResult 錯誤會顯示於此處，此處簡單呈現錯誤訊息框 -->
            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span>請檢查表單輸入是否正確</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card p-4">
                        <!-- 注意物件屬性綁定 th:object="${product}" -->
                        <form th:action="@{/backend/product/add}" th:object="${product}" method="post">
                            
                            <!-- 隱藏的上下架狀態 -->
                            <input type="hidden" name="status" id="hiddenStatus" value="1">
                            
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <h5 class="fw-bold mb-3 border-bottom pb-2"><i class="bi bi-info-circle me-2 text-primary"></i>基本資訊</h5>
                                    
                                    <div class="mb-3">
                                        <label for="productName" class="form-label">商品名稱 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" th:field="*{productName}" placeholder="請輸入商品名稱" required>
                                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
                                    </div>
                                    
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label for="activityId" class="form-label">綁定活動</label>
                                            <select class="form-select" th:field="*{activityId}">
                                                <option value="">-- 不綁定活動 --</option>
                                                <th:block th:each="activity : ${activityList}">
                                                    <option th:value="${activity.activityId}" th:text="'#' + ${activity.activityId} + ' - ' + ${activity.activityName}"></option>
                                                </th:block>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="ticketId" class="form-label">綁定票券</label>
                                            <select class="form-select" th:field="*{ticketId}">
                                                <option value="">-- 不綁定票券 --</option>
                                                <th:block th:each="ticket : ${ticketList}">
                                                    <option th:value="${ticket.ticketId}" th:text="'#' + ${ticket.ticketId} + ' - ' + ${ticket.ticketName}"></option>
                                                </th:block>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="form-text text-muted">
                                        <i class="bi bi-lightbulb me-1"></i> 您可以選擇綁定「活動」或是「票券」，也可以暫時不綁定。
                                    </div>

                                </div>
                            </div>

                            <hr class="my-4">
                            
                            <div class="text-end">
                                <a th:href="@{/backend/product}" class="btn btn-light me-2 px-4">取消</a>
                                <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                                    <i class="bi bi-check-lg me-1"></i> 確認新增
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusSwitch = document.getElementById('statusSwitch');
            const hiddenStatus = document.getElementById('hiddenStatus');
            const statusLabel = document.getElementById('statusLabel');

            if (statusSwitch) {
                statusSwitch.addEventListener('change', function() {
                    const isChecked = this.checked;
                    hiddenStatus.value = isChecked ? '1' : '0';
                    
                    if(isChecked) {
                        statusLabel.textContent = '上架中';
                        statusLabel.className = 'form-check-label ms-2 fw-bold text-primary mb-0';
                    } else {
                        statusLabel.textContent = '已下架';
                        statusLabel.className = 'form-check-label ms-2 fw-bold text-secondary mb-0';
                    }
                });
            }
        });
    </script>
</body>
</html>
