<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>FAQ 管理 - TaipeiGo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f7fb;
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
}

.main-content {
    margin-left: 240px;
    padding: 32px;
}

.page-title {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 24px;
}

.card {
    border: none;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.card-header {
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    padding: 18px 22px;
}

.table th {
    background: #f8fafc;
    color: #495057;   
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
}

.table td {
    vertical-align: middle;
    font-size: 15px;
}

.faq-title {
    font-weight: 600;
}

.content-preview {
    max-width: 420px;
    color: #64748b;
}

.badge-show {
    background: #e8f7ee;
    color: #198754;
}

.badge-hide {
    background: #f1f3f5;
    color: #6c757d;
}

.action-btn {
    text-decoration: none;
    margin: 0 4px;
    font-size: 18px;
}

.search-input {
    max-width: 260px;
}

@media (max-width: 768px) {
    .main-content {
        margin-left: 0;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="page-title">
            <i class="bi bi-question-circle me-2 text-primary"></i>
            FAQ 管理
        </div>

        <a class="btn btn-primary" th:href="@{/backend/faq/add}">
            <i class="bi bi-plus-lg"></i>
            新增 FAQ
        </a>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div class="fw-bold">
                FAQ 列表
            </div>

            <input type="text"
                   id="searchInput"
                   class="form-control search-input"
                   placeholder="搜尋 FAQ...">
        </div>

        <div class="table-responsive">
            <table class="table table-hover mb-0" id="faqTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>分類</th>
                        <th>標題</th>
                        <th>內容摘要</th>
                        <th>狀態</th>
                        <th>最後異動時間</th>
                        <th class="text-center">操作</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:if="${faqList == null or faqList.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            目前沒有 FAQ 資料
                        </td>
                    </tr>

                    <tr th:each="faq, iterStat : ${faqList}">
                        <td th:text="${iterStat.index + 1}"></td>

                        <td th:switch="${faq.category}">
                            <span th:case="1" class="badge bg-primary-subtle text-primary">訂單與付款</span>
                            <span th:case="2" class="badge bg-success-subtle text-success">票券使用</span>
                            <span th:case="3" class="badge bg-warning-subtle text-warning">帳號與會員</span>
                            <span th:case="4" class="badge bg-info-subtle text-info">活動與門票</span>
                            <span th:case="5" class="badge bg-secondary-subtle text-secondary">其他</span>
                            <span th:case="*" class="badge bg-light text-dark">未分類</span>
                        </td>

                        <td class="faq-title" th:text="${faq.title}"></td>

                        <td class="content-preview"
                            th:text="${#strings.abbreviate(faq.content, 45)}"></td>

                        <td>
                            <span th:if="${faq.status == 1}" class="badge badge-show">
                                <i class="bi bi-circle-fill me-1" style="font-size:6px;"></i>
                                顯示
                            </span>

                            <span th:if="${faq.status == 0}" class="badge badge-hide">
                                <i class="bi bi-circle-fill me-1" style="font-size:6px;"></i>
                                隱藏
                            </span>
                        </td>

                        <td th:text="${#dates.format(faq.createTime, 'yyyy-MM-dd HH:mm')}"></td>

                        <td class="text-center">
                            <a class="action-btn text-warning"
                               th:href="@{/backend/faq/edit(faqId=${faq.faqId})}"
                               title="修改">
                                <i class="bi bi-pencil-square"></i>
                            </a>

                            <a class="action-btn text-danger"
                               th:href="@{/backend/faq/delete(faqId=${faq.faqId})}"
                               onclick="return confirm('確定要刪除此 FAQ 嗎？')"
                               title="刪除">
                                <i class="bi bi-trash3"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
			
        </div>
        
        <div class="card-footer d-flex justify-content-between align-items-center">
    <div class="text-muted small">
        共 <span th:text="${totalItems}"></span> 筆資料，
        第 <span th:text="${currentPage + 1}"></span> 頁 /
        共 <span th:text="${totalPages}"></span> 頁
    </div>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">

            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/backend/faq/list(page=${currentPage - 1})}">
                    上一頁
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/backend/faq/list(page=${i})}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/backend/faq/list(page=${currentPage + 1})}">
                    下一頁
                </a>
            </li>

        </ul>
    </nav>
</div>
    </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');

if (searchInput) {
    searchInput.addEventListener('input', function () {
        const keyword = this.value.toLowerCase();
        const rows = document.querySelectorAll('#faqTable tbody tr');

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(keyword) ? '' : 'none';
        });
    });
}
</script>

</body>
</html>
