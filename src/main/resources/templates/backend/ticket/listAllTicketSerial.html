<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO ｜ 後台門票序號管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ticket/backend/listAllTicket.css}">
    <style>
        .serial-code {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            background-color: #f8fafc;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            letter-spacing: 0.5px;
            color: #1e293b;
        }
    </style>
</head>

<body>

    <div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

    <div class="main-wrap">

        <header class="topbar">
            <div class="topbar-title">
                <i class="bi bi-upc-scan me-2" style="color:var(--primary);"></i>
                門票序號管理
                <span>/ 序號列表</span>
            </div>

            <a class="btn-add" th:href="@{/backend/ticket/list}">
                <i class="bi bi-plus-lg"></i>
                <span>新增序號</span>
            </a>
        </header>

        <main class="content-area">

            <!-- Flash messages -->
            <div class="alert-success-custom" th:if="${success}">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${success}"></span>
            </div>
            <div class="alert alert-danger" th:if="${error}" style="border-radius: 10px; margin-bottom: 20px;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Stats Row -->
            <div class="row stats-row g-3" th:if="${totalCount > 0}">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="bi bi-upc-scan"></i>
                        </div>
                        <div>
                            <div class="stat-label">總門票序號數</div>
                            <div class="stat-value" th:text="${totalCount}">
                                0
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="bi bi-box-seam-fill"></i>
                        </div>
                        <div>
                            <div class="stat-label">庫存中 / 可販售</div>
                            <div class="stat-value" th:text="${stockCount}">
                                0
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <i class="bi bi-bag-check-fill"></i>
                        </div>
                        <div>
                            <div class="stat-label">已售出 / 使用中</div>
                            <div class="stat-value" th:text="${soldCount}">
                                0
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="table-card">
                <div class="table-card-header">
                    <div class="table-card-title">
                        <i class="bi bi-list-ol me-1" style="color:var(--primary);"></i>
                        門票序號列表
                        <span th:text="${'共 ' + pageResult.totalElements + ' 筆'}"></span>
                    </div>

                    <form th:action="@{/backend/ticket/serialList}" method="get"
                        class="search-bar d-flex align-items-center gap-1" style="max-width: 320px;">
                        <div style="position: relative; flex-grow: 1;">
                            <i class="bi bi-search"
                                style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.9rem;"></i>
                            <input type="text" name="keyword" th:value="${keyword}" placeholder="搜尋序號、商品、會員..."
                                class="form-control"
                                style="padding-left: 32px; border-radius: 8px; height: 36px; font-size: 0.85rem;">
                        </div>
                        <button class="btn btn-primary btn-sm" type="submit"
                            style="height: 36px; font-size: 0.85rem; border-radius: 8px; padding: 0 12px;">搜尋</button>
                        <a th:if="${keyword != null and keyword != ''}" th:href="@{/backend/ticket/serialList}"
                            class="btn btn-outline-secondary btn-sm"
                            style="height: 36px; font-size: 0.85rem; border-radius: 8px; padding: 0 12px; display: inline-flex; align-items: center; white-space: nowrap;">重置</a>
                    </form>
                </div>

                <div class="table-responsive">
                    <table class="table custom-table" id="serialTable">
                        <thead>
                            <tr>
                                <th width="5%" class="text-center">#</th>
                                <th width="8%" class="text-center">序號 ID</th>
                                <th width="20%">對應門票商品</th>
                                <th width="15%">序號號碼</th>
                                <th width="10%">購買會員</th>
                                <th width="10%" class="text-center">關聯訂單</th>
                                <th width="12%">使用期限</th>
                                <th width="8%" class="text-center">狀態</th>
                                <th style="min-width: 150px;" class="text-center">操作</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${ticketSerialListData == null or ticketSerialListData.isEmpty()}">
                                <td colspan="9">
                                    <div class="empty-state">
                                        <i class="bi bi-upc"></i>
                                        <div>目前沒有任何門票序號資料</div>
                                        <div class="mt-2 text-muted small">請至門票商品管理頁面新增可用序號</div>
                                    </div>
                                </td>
                            </tr>

                            <tr th:each="serial, iterStat : ${ticketSerialListData}">
                                <td class="text-center" style="color:#94a3b8; font-size:0.8rem;"
                                    th:text="${currentPage * 10 + iterStat.index + 1}"></td>
                                <td class="text-center text-muted" th:text="${serial.ticketSerialId}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div>
                                            <div class="fw-bold text-dark" th:text="${serial.ticketVO.ticketName}">商品名稱
                                            </div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="serial-code" th:text="${serial.serialNumber}">TK000000000</span>
                                </td>
                                <td>
                                    <div th:if="${serial.customerVO != null}">
                                        <span class="fw-medium text-dark"
                                            th:text="${serial.customerVO.custName}">會員姓名</span>
                                        <div class="small text-muted"
                                            th:text="'(ID: ' + ${serial.customerVO.custId} + ')'"></div>
                                    </div>
                                    <span th:unless="${serial.customerVO != null}" class="text-muted small">—</span>
                                </td>
                                <td class="text-center">
                                    <span th:if="${serial.ordersVO != null}" class="badge bg-light text-dark border"
                                        th:text="${serial.ordersVO.orderId}"></span>
                                    <span th:unless="${serial.ordersVO != null}" class="text-muted small">—</span>
                                </td>
                                <td class="small text-muted">
                                    <span th:if="${serial.expiryDate != null}"
                                        th:text="${#dates.format(serial.expiryDate, 'yyyy-MM-dd HH:mm')}"></span>
                                    <span th:unless="${serial.expiryDate != null}" class="text-muted small">尚未設定</span>
                                </td>
                                <td class="text-center">
                                    <!-- status == 1: 庫存中/未售出 -->
                                    <span th:if="${serial.status == 1}" class="status-badge status-active">
                                        <span class="status-dot"></span>
                                        在庫
                                    </span>

                                    <!-- status == 2: 已售出/未使用 -->
                                    <span th:if="${serial.status == 2}" class="status-badge"
                                        style="background:#eff6ff; color:#3b82f6;">
                                        <span class="status-dot" style="background:#3b82f6;"></span>
                                        已售出
                                    </span>

                                    <!-- status == 3: 已使用 -->
                                    <span th:if="${serial.status == 3}" class="status-badge"
                                        style="background:#f0fdf4; color:#16a34a;">
                                        <span class="status-dot" style="background:#16a34a;"></span>
                                        已使用
                                    </span>

                                    <!-- status == 4: 已過期 -->
                                    <span th:if="${serial.status == 4}" class="status-badge"
                                        style="background:#fff7ed; color:#ea580c;">
                                        <span class="status-dot" style="background:#ea580c;"></span>
                                        已過期
                                    </span>

                                    <!-- status == 5: 已下架 -->
                                    <span th:if="${serial.status == 5}" class="status-badge status-inactive">
                                        <span class="status-dot"></span>
                                        已下架
                                    </span>

                                    <!-- status == 6: 已作廢 -->
                                    <span th:if="${serial.status == 6}" class="status-badge"
                                        style="background:#f1f5f9; color:#64748b;">
                                        <span class="status-dot" style="background:#64748b;"></span>
                                        已作廢
                                    </span>
                                </td>
                                <td class="text-center">
                                    <!-- Only show action for status = 1 (庫存中) -->
                                    <form th:if="${serial.status == 1}" th:action="@{/backend/ticket/offMarketSerial}"
                                        method="post" class="d-inline" style="margin:0;"
                                        onsubmit="return confirm('確定要將此門票序號下架嗎？');">
                                        <input type="hidden" name="ticketSerialId" th:value="${serial.ticketSerialId}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger px-3 py-1"
                                            style="border-radius: 6px; font-size: 13px; font-weight: 500;">
                                            <i class="bi bi-dash-circle me-1"></i>下架
                                        </button>
                                    </form>
                                    <span th:unless="${serial.status == 1}" class="text-muted small">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-footer" th:if="${totalPages > 0}">
                    <div class="table-footer-info">
                        共 <span th:text="${pageResult.totalElements}"></span> 筆資料，
                        第 <span th:text="${currentPage + 1}"></span> 頁 /
                        共 <span th:text="${totalPages}"></span> 頁
                    </div>

                    <nav th:if="${totalPages > 1}">
                        <ul class="pagination pagination-sm mb-0">
                            <!-- 上一頁 -->
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/backend/ticket/serialList(keyword=${keyword}, page=${currentPage - 1})}">
                                    上一頁
                                </a>
                            </li>

                            <!-- 數字頁碼 -->
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:text="${i + 1}"
                                    th:href="@{/backend/ticket/serialList(keyword=${keyword}, page=${i})}"></a>
                            </li>

                            <!-- 下一頁 -->
                            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/backend/ticket/serialList(keyword=${keyword}, page=${currentPage + 1})}">
                                    下一頁
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
