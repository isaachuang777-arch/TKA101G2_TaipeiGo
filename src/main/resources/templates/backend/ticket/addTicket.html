<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO ｜ 新增門票商品</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ticket/backend/addTicket.css}">
 
</head>
<body>
<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<!-- Main -->
<div class="main-wrap">
    <header class="topbar">
        <div class="topbar-title">
            <i class="bi bi-plus-circle me-2" style="color:var(--primary);"></i>
            新增門票商品
            <span>/ 填寫商品資料</span>
        </div>
    </header>

    <div class="content-area">

        <!-- Breadcrumb -->
        <div class="breadcrumb-custom">
            <a th:href="@{/backend/ticket/list}"><i class="bi bi-house-door"></i> 門票商品列表</a>
            <i class="bi bi-chevron-right" style="font-size:0.7rem;"></i>
            <span>新增門票商品</span>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h5><i class="bi bi-ticket-perforated-fill me-2" style="color:var(--primary);"></i>新增門票商品資料</h5>
                <p>請填寫以下欄位，帶有 <span style="color:#ef4444;">*</span> 的欄位為必填。</p>
            </div>

            <div class="form-card-body">

                <form id="ticketForm" th:action="@{/backend/ticket/insert}" method="post" th:object="${ticketVO}" enctype="multipart/form-data" novalidate>

                    <!-- Error Summary -->
                    <div class="error-summary" th:if="${#fields.hasAnyErrors()}">
                        <div class="error-title">
                            <i class="bi bi-exclamation-circle-fill"></i> 請修正以下錯誤：
                        </div>
                        <ul>
                            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <!-- Section: 基本資料 -->
                    <div class="section-title"><i class="bi bi-info-circle-fill"></i> 基本資料</div>

                    <div class="row g-3 mb-4">
                        <!-- 商品名稱 -->
                        <div class="col-md-8">
                            <label class="form-label">門票商品名稱 <span class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-ticket-perforated"></i></span>
                                <input type="text" class="form-control" th:field="*{ticketName}"
                                       th:classappend="${#fields.hasErrors('ticketName')} ? 'is-invalid'"
                                       placeholder="例如：台北市立動物園特展門票" id="ticketName" required>
                            </div>
                            <div class="invalid-feedback-custom server-error-ticketName" th:if="${#fields.hasErrors('ticketName')}">
                                <i class="bi bi-exclamation-circle"></i>
                                <span th:errors="*{ticketName}"></span>
                            </div>
                        </div>

                        <!-- 上架狀態 -->
                        <div class="col-md-4">
                            <label class="form-label">上架狀態 <span class="required-mark">*</span></label>
                            <select class="form-select" th:field="*{ticketStatus}" id="ticketStatus">
                                <option value="1">上架中</option>
                                <option value="0">已下架</option>
                            </select>
                        </div>

                        <!-- 門票分類 -->
                        <div class="col-12">
                            <label class="form-label">選擇門票分類 (可多選)</label>
                            <div class="card p-3" style="border: 1.5px solid #e2e8f0; border-radius: 9px; background: #fafbfc;">
                                <div class="d-flex flex-wrap gap-4">
                                    <div th:each="category : ${categoryList}" class="form-check">
                                        <input class="form-check-input" type="checkbox" 
                                               th:value="${category.ticketCategoryId}" 
                                               th:field="*{ticketCategories}"
                                               th:id="'cate-' + ${category.ticketCategoryId}">
                                        <label class="form-check-label text-dark" 
                                               th:for="'cate-' + ${category.ticketCategoryId}" 
                                               th:text="${category.ticketCategoryName}">分類</label>
                                    </div>
                                    <div th:if="${#lists.isEmpty(categoryList)}" class="text-muted small">
                                        <i class="bi bi-info-circle me-1"></i>請先至門票分類管理建立分類資料。
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 地址 -->
                        <div class="col-12">
                            <label class="form-label">景點地址 <span class="required-mark">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                <input type="text" class="form-control" th:field="*{ticketAddress}"
                                       th:classappend="${#fields.hasErrors('ticketAddress')} ? 'is-invalid'"
                                       placeholder="請輸入完整景點地址" id="ticketAddress" required>
                            </div>
                            <div class="invalid-feedback-custom server-error-ticketAddress" th:if="${#fields.hasErrors('ticketAddress')}">
                                <i class="bi bi-exclamation-circle"></i>
                                <span th:errors="*{ticketAddress}"></span>
                            </div>
                        </div>

                        <!-- 描述 -->
                        <div class="col-12">
                            <label class="form-label">門票詳細描述 / 使用須知</label>
                            <textarea th:field="*{ticketDescription}" class="form-control" id="ticketDescription" rows="4" 
                                      placeholder="請填寫門票的詳細介紹、交通方式與後續核銷說明..."></textarea>
                        </div>
                    </div>

                    <!-- Section: 票價設定 -->
                    <div class="section-title"><i class="bi bi-currency-dollar"></i> 票價設定</div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="price-setup-card">
                                <div class="price-title"><i class="bi bi-person-fill text-primary"></i> 成人票設定</div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small">原價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{adultOriginalPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                                <div>
                                    <label class="form-label text-secondary small">促銷售價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{adultPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="price-setup-card">
                                <div class="price-title"><i class="bi bi-backpack-fill text-success"></i> 兒童票設定</div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small">原價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{childOriginalPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                                <div>
                                    <label class="form-label text-secondary small">促銷售價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{childPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="price-setup-card">
                                <div class="price-title"><i class="bi bi-heart-pulse-fill text-warning"></i> 優待票設定</div>
                                <div class="mb-3">
                                    <label class="form-label text-secondary small">原價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{concessionOriginalPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                                <div>
                                    <label class="form-label text-secondary small">促銷售價 <span class="required-mark">*</span></label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">$</span>
                                        <input type="number" th:field="*{concessionPrice}" class="form-control" placeholder="0" min="0" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section: 圖片上傳 -->
                    <div class="section-title"><i class="bi bi-images"></i> 圖片上傳</div>

                    <div class="mb-4">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            <span>選擇商品圖片 (最多 8 張)</span>
                            <span id="uploadCountText" class="text-secondary small">(目前 0/8 張)</span>
                        </label>
                        <div class="image-uploader-box" onclick="document.getElementById('ticketImageFiles').click()">
                            <i class="bi bi-cloud-arrow-up text-muted" style="font-size: 2.2rem;"></i>
                            <p class="mt-2 mb-1 fw-bold text-dark">點擊此處選擇圖片檔案</p>
                            <p class="text-muted small mb-0">支援 JPG、PNG 格式，第一張自動為主封面圖，最多限上傳 8 張</p>
                            <input type="file" id="ticketImageFiles" class="d-none" multiple accept="image/*" onchange="previewImages(this)">
                        </div>
                        <div class="preview-img-container" id="previewContainer"></div>
                    </div>

                    <!-- Buttons -->
                    <div style="display:flex; gap:12px; padding-top:16px; border-top:1px solid #f1f5f9; margin-top:24px;">
                        <button type="submit" class="btn-submit">
                            <i class="bi bi-plus-circle-fill"></i> 新增門票商品
                        </button>
                        <button type="button" onclick="resetForm()" class="btn btn-link text-secondary text-decoration-none fw-semibold">
                            重新填寫
                        </button>
                        <a th:href="@{/backend/ticket/list}" class="btn-cancel ms-auto">
                            <i class="bi bi-arrow-left"></i> 返回列表
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

<script th:src="@{/js/ticket/addTicket.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ---- 使用者重新輸入時，清除該欄位上一次由後端回傳的錯誤 ----
    document.querySelectorAll('input[name], select[name], textarea[name]').forEach(function (el) {
        function clearServerError() {
            document.querySelectorAll('.server-error-' + el.name)
                .forEach(function (msg) {
                    msg.style.display = 'none';
                });
        }

        el.addEventListener('input', clearServerError);
        el.addEventListener('change', clearServerError);
    });
</script>
</body>
</html>
