<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO ｜ 修改門票商品</title>
    、
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ticket/backend/addTicket.css}">
</head>

<body>
    <div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

    <!-- Main -->
    <div class="main-wrap">
        <header class="topbar">
            <div class="topbar-title">
                <i class="bi bi-pencil-square me-2" style="color:#f97316;"></i>
                修改門票商品
                <span th:text="${'/ ' + ticketVO.ticketName}">/ 編輯</span>
            </div>
            <span class="id-badge">
                <i class="bi bi-hash"></i>
                <span th:text="${'ID: ' + ticketVO.ticketId}">ID</span>
            </span>
        </header>

        <div class="content-area">

            <!-- Breadcrumb -->
            <div class="breadcrumb-custom">
                <a th:href="@{/backend/ticket/list}"><i class="bi bi-house-door"></i> 門票商品列表</a>
                <i class="bi bi-chevron-right" style="font-size:0.7rem;"></i>
                <span th:text="${ticketVO.ticketName}">修改</span>
            </div>

            <div class="form-card">
                <div class="form-card-header">
                    <h5><i class="bi bi-pencil-square me-2" style="color:#f97316;"></i>修改門票商品資料</h5>
                    <p>修改完成後請點選「儲存變更」。</p>
                </div>

                <div class="form-card-body">

                    <form id="ticketForm" th:action="@{/backend/ticket/update}" method="post" th:object="${ticketVO}"
                        enctype="multipart/form-data" novalidate>

                        <input type="hidden" th:field="*{ticketId}">

                        <div id="deleteImageIdsContainer"></div>

                        <!-- Error Summary -->
                        <div class="error-summary" th:if="${not #lists.isEmpty(#fields.errors())}">
                            <div class="error-title">
                                <i class="bi bi-exclamation-circle-fill"></i> 請修正以下錯誤：
                            </div>
                            <ul>
                                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <!-- Section: 基本資料 -->
                        <div class="section-title"><i class="bi bi-info-circle-fill"></i> 基本資料</div>

                        <div class="row g-3 mb-4">
                            <!-- 商品編號 (Readonly) -->
                            <div class="col-md-4">
                                <label class="form-label">門票商品編號</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                    <input type="text" class="form-control" th:field="*{ticketId}" readonly>
                                </div>
                            </div>

                            <!-- 上架狀態 -->
                            <div class="col-md-8">
                                <label class="form-label">門票狀態 <span class="required-mark">*</span></label>
                                <select class="form-select" th:field="*{ticketStatus}" id="ticketStatus">
                                    <option value="1">上架</option>
                                    <option value="0">下架</option>
                                </select>
                            </div>

                            <!-- 商品名稱 -->
                            <div class="col-12">
                                <label class="form-label">門票商品名稱 <span class="required-mark">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-ticket-perforated"></i></span>
                                    <input type="text" class="form-control" th:field="*{ticketName}"
                                        th:classappend="${#fields.hasErrors('ticketName')} ? 'is-invalid'"
                                        placeholder="例如：台北市立動物園特展門票" id="ticketName" required>
                                </div>
                                <div class="invalid-feedback-custom server-error-ticketName"
                                    th:if="${#fields.hasErrors('ticketName')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:errors="*{ticketName}"></span>
                                </div>
                                <div class="invalid-feedback-custom" id="ticketNameError" style="display:none;">
                                    <i class="bi bi-exclamation-circle"></i> 門票商品名稱不能留白且不能超過 50 個字
                                </div>
                            </div>

                            <!-- 門票分類 -->
                            <div class="col-12">
                                <label class="form-label">選擇門票分類 (可多選) <span class="required-mark">*</span></label>
                                <div class="card p-3"
                                    style="border: 1.5px solid #e2e8f0; border-radius: 9px; background: #fafbfc;"
                                    th:classappend="${#fields.hasErrors('ticketCategories')} ? 'border-danger'">
                                    <div class="d-flex flex-wrap gap-4">
                                        <div th:each="category : ${categoryList}" class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                th:value="${category.ticketCategoryId}" th:field="*{ticketCategories}"
                                                th:id="'cate-' + ${category.ticketCategoryId}">
                                            <label class="form-check-label text-dark"
                                                th:for="'cate-' + ${category.ticketCategoryId}"
                                                th:text="${category.ticketCategoryStatus == 1 ? category.ticketCategoryName : category.ticketCategoryName + ' (未啟用)'}">分類</label>
                                        </div>
                                        <div th:if="${#lists.isEmpty(categoryList)}" class="text-muted small">
                                            <i class="bi bi-info-circle me-1"></i>請先至門票分類管理建立分類資料。
                                        </div>
                                    </div>
                                </div>
                                <div class="invalid-feedback-custom server-error-ticketCategories"
                                    th:if="${#fields.hasErrors('ticketCategories')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:errors="*{ticketCategories}"></span>
                                </div>
                                <div class="invalid-feedback-custom" id="ticketCategoriesError" style="display:none;">
                                    <i class="bi bi-exclamation-circle"></i> 請至少選擇一個門票分類
                                </div>
                            </div>

                            <!-- 地址 -->
                            <div class="col-12">
                                <label class="form-label">景點地址 <span class="required-mark">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" class="form-control" th:field="*{ticketAddress}"
                                        th:classappend="${#fields.hasErrors('ticketAddress')} ? 'is-invalid'"
                                        placeholder="請輸入完整景點地址" id="ticketAddress" required>
                                </div>
                                <div class="invalid-feedback-custom server-error-ticketAddress"
                                    th:if="${#fields.hasErrors('ticketAddress')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:errors="*{ticketAddress}"></span>
                                </div>
                                <div class="invalid-feedback-custom" id="ticketAddressError" style="display:none;">
                                    <i class="bi bi-exclamation-circle"></i> 景點地址不能留白且不能超過 50 個字
                                </div>
                            </div>

                            <!-- 描述 -->
                            <div class="col-12">
                                <label class="form-label">門票詳細描述 / 使用須知</label>
                                <textarea th:field="*{ticketDescription}" class="form-control" id="ticketDescription"
                                    rows="4" placeholder="請填寫門票的詳細介紹、交通方式與後續核銷說明..." maxlength="500"
                                    th:classappend="${#fields.hasErrors('ticketDescription')} ? 'is-invalid'"></textarea>
                                <div class="invalid-feedback-custom server-error-ticketDescription"
                                    th:if="${#fields.hasErrors('ticketDescription')}">
                                    <i class="bi bi-exclamation-circle"></i>
                                    <span th:errors="*{ticketDescription}"></span>
                                </div>
                                <div class="invalid-feedback-custom" id="ticketDescriptionError" style="display:none;">
                                    <i class="bi bi-exclamation-circle"></i> 門票描述長度不能超過 500 個字
                                </div>
                            </div>
                        </div>

                        <!-- Section: 票價設定 -->
                        <div class="section-title"><i class="bi bi-currency-dollar"></i> 票價設定</div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="price-setup-card" th:classappend="${#fields.hasErrors('adultOriginalPrice') or #fields.hasErrors('adultPrice')} ? 'border-danger'">
                                    <div class="price-title"><i class="bi bi-person-fill text-primary"></i> 成人票設定</div>
                                    <div class="mb-3">
                                        <label class="form-label text-secondary small">原價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{adultOriginalPrice}" class="form-control"
                                                th:classappend="${#fields.hasErrors('adultOriginalPrice')} ? 'is-invalid'"
                                                placeholder="0" min="0" required id="adultOriginalPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-adultOriginalPrice"
                                            th:if="${#fields.hasErrors('adultOriginalPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{adultOriginalPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="adultOriginalPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                    <div>
                                        <label class="form-label text-secondary small">促銷售價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{adultPrice}" class="form-control"
                                                th:classappend="${#fields.hasErrors('adultPrice')} ? 'is-invalid'"
                                                placeholder="0" min="0" required id="adultPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-adultPrice"
                                            th:if="${#fields.hasErrors('adultPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{adultPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="adultPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="price-setup-card" th:classappend="${#fields.hasErrors('childOriginalPrice') or #fields.hasErrors('childPrice')} ? 'border-danger'">
                                    <div class="price-title"><i class="bi bi-backpack-fill text-success"></i> 兒童票設定
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-secondary small">原價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{childOriginalPrice}" class="form-control"
                                                th:classappend="${#fields.hasErrors('childOriginalPrice')} ? 'is-invalid'"
                                                placeholder="0" min="0" required id="childOriginalPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-childOriginalPrice"
                                            th:if="${#fields.hasErrors('childOriginalPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{childOriginalPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="childOriginalPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                    <div>
                                        <label class="form-label text-secondary small">促銷售價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{childPrice}" class="form-control"
                                                th:classappend="${#fields.hasErrors('childPrice')} ? 'is-invalid'"
                                                placeholder="0" min="0" required id="childPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-childPrice"
                                            th:if="${#fields.hasErrors('childPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{childPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="childPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="price-setup-card" th:classappend="${#fields.hasErrors('concessionOriginalPrice') or #fields.hasErrors('concessionPrice')} ? 'border-danger'">
                                    <div class="price-title"><i class="bi bi-heart-pulse-fill text-warning"></i> 優待票設定
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label text-secondary small">原價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{concessionOriginalPrice}"
                                                class="form-control" placeholder="0" min="0" required
                                                th:classappend="${#fields.hasErrors('concessionOriginalPrice')} ? 'is-invalid'"
                                                id="concessionOriginalPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-concessionOriginalPrice"
                                            th:if="${#fields.hasErrors('concessionOriginalPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{concessionOriginalPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="concessionOriginalPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                    <div>
                                        <label class="form-label text-secondary small">促銷售價 <span
                                                class="required-mark">*</span></label>
                                        <div class="input-group input-group-sm">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{concessionPrice}" class="form-control"
                                                placeholder="0" min="0" required
                                                th:classappend="${#fields.hasErrors('concessionPrice')} ? 'is-invalid'"
                                                id="concessionPrice">
                                        </div>
                                        <div class="invalid-feedback-custom server-error-concessionPrice"
                                            th:if="${#fields.hasErrors('concessionPrice')}">
                                            <i class="bi bi-exclamation-circle"></i>
                                            <span th:errors="*{concessionPrice}"></span>
                                        </div>
                                        <div class="invalid-feedback-custom" id="concessionPriceError" style="display:none;">
                                            <i class="bi bi-exclamation-circle"></i> 必須大於等於 0
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Section: 圖片管理 -->
                        <div class="section-title"><i class="bi bi-images"></i> 圖片管理</div>

                        <!-- 目前已上傳的圖片 -->
                        <div class="col-12 mb-4" th:if="${not #lists.isEmpty(ticketVO.ticketImages)}">
                            <label class="form-label text-secondary"><i class="bi bi-image me-1"></i> 目前已上傳的圖片
                                (第一張為封面，點擊紅叉可移除)</label>
                            <div class="d-flex flex-wrap gap-3 p-3 bg-light rounded-3 border">
                                <div th:each="img : ${ticketVO.ticketImages}"
                                    th:id="'old-img-wrapper-' + ${img.ticketImageId}"
                                    class="preview-img-wrapper shadow-sm">
                                    <img th:src="${img.ticketImageSrc}" alt="現有圖片">
                                    <button type="button" class="btn-delete-img"
                                        th:onclick="'markImageForDeletion(' + ${img.ticketImageId} + ')'" title="移除此圖片">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 上傳新圖片 -->
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between align-items-center">
                                <span>上傳新圖片 (注意：新圖片將會追加到商品中，最多 8 張)</span>
                                <span id="uploadCountText" class="text-secondary small">(目前 0/8 張)</span>
                            </label>
                            <div class="image-uploader-box"
                                onclick="document.getElementById('ticketImageFiles').click()">
                                <i class="bi bi-cloud-arrow-up text-muted" style="font-size: 2.2rem;"></i>
                                <p class="mt-2 mb-1 fw-bold text-dark">點擊此處選擇圖片檔案</p>
                                <p class="text-muted small mb-0">支援 JPG、PNG 格式，最多限上傳 8 張</p>
                                <input type="file" id="ticketImageFiles" class="d-none" multiple accept="image/*"
                                    onchange="previewImages(this)">
                            </div>
                            <div class="preview-img-container" id="previewContainer"></div>
                        </div>

                        <!-- Buttons -->
                        <div
                            style="display:flex; gap:12px; padding-top:16px; border-top:1px solid #f1f5f9; margin-top:24px;">
                            <button type="submit" class="btn-submit">
                                <i class="bi bi-check-lg"></i> 儲存變更
                            </button>
                            <button type="button"
                                onclick="document.getElementById('ticketForm').reset(); location.reload();"
                                class="btn btn-link text-secondary text-decoration-none fw-semibold">
                                還原修改
                            </button>
                            <a th:href="@{/backend/ticket/list}" class="btn-cancel ms-auto">
                                <i class="bi bi-arrow-left"></i> 返回列表
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <script th:src="@{/js/ticket/backend/addTicket.js}"></script>
    <script th:src="@{/js/ticket/backend/updateTicket.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ---- 使用者重新輸入時，清除該欄位上一次由後端回傳的錯誤 ----
        document.querySelectorAll('input[name], select[name], textarea[name]').forEach(function (el) {
            function clearServerError() {
                document.querySelectorAll('.server-error-' + el.name)
                    .forEach(function (msg) {
                        msg.style.display = 'none';
                    });
            }

            el.addEventListener('input', clearServerError);
            el.addEventListener('change', clearServerError);
        });
    </script>
</body>

</html>
