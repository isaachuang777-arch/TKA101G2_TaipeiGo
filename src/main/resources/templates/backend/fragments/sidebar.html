<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<th:block th:fragment="sidebar">

<style>
:root {
    --primary: #0d6efd;
    --sidebar-width: 260px;
    --sidebar-bg: #1a2236;
}

.sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--sidebar-bg);
    position: fixed;
    left: 0;
    top: 0;
    color: white;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 4px 0 18px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
}

.sidebar-content {
    flex: 1;
}

.sidebar-title {
    padding: 22px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-title .brand {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1px;
}

.sidebar-title .sub {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-top: 4px;
}

.menu-title {
    padding: 18px 20px 8px;
    color: #94a3b8;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e2e8f0;
    text-decoration: none;
    padding: 13px 18px;
    margin: 4px 12px;
    border-radius: 0 10px 10px 0;
    font-size: 0.92rem;
    border-left: 4px solid transparent;
    transition: all .2s;
}

.sidebar a i {
    font-size: 1.05rem;
    width: 20px;
    text-align: center;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    transform: translateX(3px);
}

.sidebar a.active {
    background: rgba(13,110,253,0.16);
    color: #ffffff;
    border-left-color: var(--primary);
}

.admin-menu {
    margin: 4px 12px;
}

.admin-menu summary {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    cursor: pointer;
    color: #e2e8f0;
    list-style: none;
    border-radius: 0 10px 10px 0;
    font-size: 0.92rem;
    border-left: 4px solid transparent;
    transition: all .2s;
}

.admin-menu summary::-webkit-details-marker {
    display: none;
}

.admin-menu summary:hover {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    transform: translateX(3px);
}

.admin-menu summary i {
    font-size: 1.05rem;
    width: 20px;
    text-align: center;
}

.admin-menu .arrow {
    margin-left: auto;
    width: auto;
    font-size: 0.8rem;
    transition: transform .2s;
}

.admin-menu[open] .arrow {
    transform: rotate(180deg);
}

.admin-menu .submenu {
    margin-top: 4px;
    margin-left: 18px;
}

.admin-menu .submenu a {
    font-size: 0.85rem;
    padding: 10px 14px;
    margin: 2px 8px;
    color: #cbd5e1;
}

.admin-menu .submenu a i {
    font-size: 0.95rem;
}

/* 左下角登入管理員資訊卡 */
.sidebar-admin-info {
    margin: 12px;
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    color: #e2e8f0;
}

.admin-info-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.admin-info-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cbd5e1;
    flex-shrink: 0;
}

.admin-info-icon i {
    font-size: 1.2rem;
}

.sidebar-admin-name {
    font-weight: 700;
    font-size: 0.92rem;
    line-height: 1.2;
}

.sidebar-admin-role {
    color: #94a3b8;
    font-size: 0.75rem;
    margin-top: 4px;
    line-height: 1.3;
}

@media (max-width: 768px) {
    .sidebar {
        display: none;
    }
}
</style>

<aside class="sidebar">

    <div class="sidebar-content">

        <div class="sidebar-title">
            <div class="brand">台北GO了沒</div>
            <div class="sub">Backend Management</div>
        </div>

        <div class="menu-title">後台總覽</div>

        <a th:href="@{/backend/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? ' active'">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>後台首頁</span>
        </a>

        <details class="admin-menu">
            <summary>
                <i class="bi bi-person-circle"></i>
                <span>個人設定</span>
                <i class="bi bi-chevron-down arrow"></i>
            </summary>

            <div class="submenu">
                <a th:href="@{/backend/admin/profile/index}">
                    <i class="bi bi-person-lines-fill"></i>
                    <span>個人資訊</span>
                </a>

                <a th:href="@{/backend/admin/profile/resetPw}">
                    <i class="bi bi-key-fill"></i>
                    <span>更改密碼</span>
                </a>
            </div>
        </details>

        <div class="menu-title">主要管理</div>

        <a th:href="@{/backend/customer/list}"
           th:classappend="${activePage == 'customer'} ? ' active'">
            <i class="bi bi-people-fill"></i>
            <span>會員管理</span>
        </a>

        <details class="admin-menu">
            <summary>
                <i class="bi bi-window-sidebar"></i>
                <span>網站管理</span>
                <i class="bi bi-chevron-down arrow"></i>
            </summary>

            <div class="submenu">
                <a href="#">
                    <i class="bi bi-question-circle"></i>
                    <span>FAQ管理</span>
                </a>
            </div>
        </details>

        <details class="admin-menu">
            <summary>
                <i class="bi bi-ticket-perforated-fill"></i>
                <span>商品管理</span>
                <i class="bi bi-chevron-down arrow"></i>
            </summary>

            <div class="submenu">
                <a th:href="@{/backend/ticket/list}"
                    th:classappend="${activePage == 'ticket'} ? ' active'">
                    <i class="bi bi-ticket-perforated"></i>
                    <span>門票管理</span>
                </a>

                <a href="#">
                    <i class="bi bi-calendar-event"></i>
                    <span>活動管理</span>
                </a>

                <a th:href="@{/backend/ticketCategory/list}"
                    th:classappend="${activePage == 'ticketCategory'} ? ' active'">
                    <i class="bi bi-tags"></i>
                    <span>門票分類管理</span>
                </a>

                <a th:href="@{/backend/ticket/serialList}"
                    th:classappend="${activePage == 'ticketSerial'} ? ' active'">
                    <i class="bi bi-upc-scan"></i>
                    <span>門票序號管理</span>
                </a>
            </div>
        </details>

        <a href="#">
            <i class="bi bi-receipt-cutoff"></i>
            <span>訂單管理</span>
        </a>

        <a href="#">
            <i class="bi bi-headset"></i>
            <span>客服管理</span>
        </a>

        <div class="menu-title">系統管理</div>

        <a th:href="@{/backend/admin/it/index}">
            <i class="bi bi-shield-lock-fill"></i>
            <span>管理員管理</span>
        </a>

        <a href="#"
           onclick="document.getElementById('logout-form').submit(); return false;">
            <i class="bi bi-box-arrow-right"></i>
            <span>後台登出</span>
        </a>

        <form id="logout-form"
              th:action="@{/backend/auth/logout}"
              method="post"
              style="display: none;">
        </form>

    </div>

    <a th:href="@{/backend/orders}"
      th:classappend="${activePage == 'orders'} ? ' active'">
        <i class="bi bi-receipt-cutoff"></i>
        <span>訂單管理</span>
    </a>
    <div class="sidebar-admin-info"
         th:if="${session.adminVO != null}">

        <div class="admin-info-row">

            <div class="admin-info-icon">
                <i class="bi bi-person-circle"></i>
            </div>

            <div>
                <div class="sidebar-admin-name"
                     th:text="${session.adminVO.admName}">
                    管理員名稱
                </div>

                <div class="sidebar-admin-role">
                    <span th:each="perVO, iterStat : ${session.adminVO.admPerVO}">
                        <span th:text="${perVO.admfuncVO.funcName}">
                            權限名稱
                        </span>
                        <span th:if="${!iterStat.last}">、</span>
                    </span>
                </div>
            </div>

        </div>

    </div>

</aside>

</th:block>
</html>
