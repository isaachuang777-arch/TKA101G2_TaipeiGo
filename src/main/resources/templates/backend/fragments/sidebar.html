<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">

<th:block th:fragment="sidebar">

<style>
:root {
    --primary: #0d6efd;
    --sidebar-width: 240px;
    --sidebar-bg: #1a2236;
}

.sidebar {
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--sidebar-bg);
    position: fixed;
    left: 0;
    top: 0;
    color: white;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 4px 0 18px rgba(0,0,0,0.12);
}

.sidebar-title {
    padding: 22px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-title .brand {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1px;
}

.sidebar-title .sub {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-top: 4px;
}

.menu-title {
    padding: 18px 20px 8px;
    color: #94a3b8;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #e2e8f0;
    text-decoration: none;
    padding: 13px 18px;
    margin: 4px 12px;
    border-radius: 0 10px 10px 0;
    font-size: 0.92rem;
    border-left: 4px solid transparent;
    transition: all .2s;
}

.sidebar a i {
    font-size: 1.05rem;
    width: 20px;
    text-align: center;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    transform: translateX(3px);
}

.sidebar a.active {
    background: rgba(13,110,253,0.16);
    color: #ffffff;
    border-left-color: var(--primary);
}

.sidebar-footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: #94a3b8;
    font-size: 0.75rem;
}

@media (max-width: 768px) {
    .sidebar {
        display: none;
    }
}
</style>

<aside class="sidebar">

    <div class="sidebar-title">
        <div class="brand">台北GO了沒</div>
        <div class="sub">Backend Management</div>
    </div>

    <div class="menu-title">後台總覽</div>

    <a th:href="@{/backend/dashboard}"
       th:classappend="${activePage == 'dashboard'} ? ' active'">
        <i class="bi bi-grid-1x2-fill"></i>
        <span>後台首頁</span>
    </a>

    <div class="menu-title">主要管理</div>

    <a th:href="@{/customer/list}"
       th:classappend="${activePage == 'customer'} ? ' active'">
        <i class="bi bi-people-fill"></i>
        <span>會員管理</span>
    </a>

    <a href="#">
        <i class="bi bi-window-sidebar"></i>
        <span>網站管理</span>
    </a>

    <a href="#">
        <i class="bi bi-ticket-perforated-fill"></i>
        <span>商品管理</span>
    </a>

    <a href="#">
        <i class="bi bi-receipt-cutoff"></i>
        <span>訂單管理</span>
    </a>

    <a href="#">
        <i class="bi bi-headset"></i>
        <span>客服管理</span>
    </a>

    <div class="menu-title">系統管理</div>

    <a th:href="@{/backend/admin/it/index}">
        <i class="bi bi-shield-lock-fill"></i>
        <span>管理員管理</span>
    </a>

    <div class="sidebar-footer">
        TaipeiGo Admin System
    </div>

</aside>

</th:block>
</html>
