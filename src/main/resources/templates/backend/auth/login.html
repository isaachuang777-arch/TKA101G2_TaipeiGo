<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO 後台登入系統</title>
    
    <!-- 引入與後台一致的樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 460px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .brand-logo {
            width: 64px;
            height: 64px;
            background: #1a365d; /* 深色企業藍 */
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.3);
        }
        .login-title {
            text-align: center;
            font-weight: 700;
            color: #1a2236;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .login-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .input-group-text {
            background-color: #f8fafc;
            border-right: none;
            color: #94a3b8;
        }
        .form-control {
            border-left: none;
            background-color: #f8fafc;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within .input-group-text,
        .input-group:focus-within .form-control {
            background-color: #fff;
            border-color: #1a365d;
            color: #1a365d;
        }
        .btn-login {
            background-color: #1a365d; /* 深色企業藍 */
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #fff;
        }
        .btn-login:hover {
            background-color: #0f223f; /* 更深的深藍色 */
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <!-- Logo 區塊 -->
        <div class="brand-logo">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        
        <h2 class="login-title">TaipeiGO 後台系統</h2>
        <p class="login-subtitle">請輸入您的系統管理員帳號與密碼</p>
        
        <!-- 顯示錯誤訊息 (使用 Bootstrap Alert) -->
        <div th:if="${errorMsg != null}" class="alert alert-danger d-flex align-items-center justify-content-center" role="alert" style="padding: 10px 15px; font-size: 0.9rem; white-space: nowrap;">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>
            <div th:text="${errorMsg}"></div>
        </div>

        <!-- 表單送出到 Controller -->
        <form th:action="@{/backend/auth/login}" method="post">
            
            <div class="mb-4">
                <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="admAcc" class="form-control" placeholder="請輸入管理員帳號" required autocomplete="username">
                </div>
            </div>
            
            <div class="mb-4">
                <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="admPw" class="form-control" placeholder="請輸入密碼" required autocomplete="current-password">
                </div>
            </div>
            
            <div class="d-grid mt-5">
                <button type="submit" class="btn btn-login btn-lg">
                    登入系統 <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>
            </div>
            
        </form>
        
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
