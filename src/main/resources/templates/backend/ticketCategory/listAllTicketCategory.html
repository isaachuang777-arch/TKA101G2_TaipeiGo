<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaipeiGo - 門票分類列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center bg-dark text-white">
                <h4 class="mb-0"> 門票分類管理列表</h4>
                <a th:href="@{/ticketCategory/addTicketCategory}" class="btn btn-success btn-sm">新增門票分類</a>
            </div>
            
            <div class="card-body">
                
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>提示：</strong> <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                            <tr class="text-center">
                                <th>門票分類編號</th>
                                <th>門票分類名稱</th>
                                <th>啟用狀態</th>
                                <th>操作功能</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="vo : ${ticketCategoryListData}" class="text-center">
                                <td th:text="${vo.ticketCategoryId}"></td>
                                <td th:text="${vo.ticketCategoryName}" class="text-center"></td>
                                <td>
                                    <span th:if="${vo.ticketCategoryStatus == 1}" class="badge bg-success">啟用</span>
                                    <span th:if="${vo.ticketCategoryStatus == 0}" class="badge bg-secondary">未啟用</span>
                                </td>
                                
                                <td>
                                    <div class="d-flex justify-content-center gap-2">
                                        
                                        <form th:action="@{/ticketCategory/getOne_For_Update}" method="post">
                                            <input type="hidden" name="ticketCategoryId" th:value="${vo.ticketCategoryId}">
                                            <button type="submit" class="btn btn-primary btn-sm">修改</button>
                                        </form>
                                        
                                        <form th:action="@{/ticketCategory/delete}" method="post" 
                                            onsubmit="return confirm('確定要刪除此門票分類嗎？');">
                                            <input type="hidden" name="ticketCategoryId" th:value="${vo.ticketCategoryId}">
                                            <button type="submit" class="btn btn-danger btn-sm">刪除</button>
                                        </form>
                                        
                                    </div>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(ticketCategoryListData)}">
                                <td colspan="4" class="text-center text-muted py-4">目前沒有任何門票分類資料。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
