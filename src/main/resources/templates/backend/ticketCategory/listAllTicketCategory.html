<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO ｜ 門票分類管理</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ticketCategory.css}">
</head>
<body>

<div class="topbar">
    <div class="logo">
        台北<span>GO</span>了沒
    </div>
</div>

<div class="page-wrapper">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4 mx-auto" style="max-width: 100%; border-radius: 12px;" role="alert">
        <strong>提示：</strong> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="page-card">

        <div class="page-header">
            <div>
                <h2 class="page-title">門票分類管理</h2>
                <div class="page-subtitle">管理所有門票分類資料</div>
            </div>
            <a th:href="@{/backend/ticketCategory/addTicketCategory}" class="btn-add">
                ＋ 新增門票分類
            </a>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr class="text-center">
                        <th width="20%">門票分類編號</th>
                        <th width="35%">門票分類名稱</th>
                        <th width="20%">啟用狀態</th>
                        <th width="25%">操作功能</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr th:each="vo : ${ticketCategoryListData}" class="text-center">
                        <td th:text="${vo.ticketCategoryId}"></td>
                        <td th:text="${vo.ticketCategoryName}"></td>
                        <td>
                            <span th:if="${vo.ticketCategoryStatus == 1}" class="status-active">啟用</span>
                            <span th:if="${vo.ticketCategoryStatus == 0}" class="status-inactive">未啟用</span>
                        </td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <form th:action="@{/backend/ticketCategory/getOne_For_Update}" method="post">
                                    <input type="hidden" name="ticketCategoryId" th:value="${vo.ticketCategoryId}">
                                    <button type="submit" class="btn-edit">修改</button>
                                </form>
                                
                                <form th:action="@{/backend/ticketCategory/delete}" method="post" 
                                      onsubmit="return confirm('確定要刪除此門票分類嗎？');">
                                    <input type="hidden" name="ticketCategoryId" th:value="${vo.ticketCategoryId}">
                                    <button type="submit" class="btn-delete">刪除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(ticketCategoryListData)}">
                        <td colspan="4" class="text-center text-muted py-5 fs-5">
                            目前沒有任何門票分類資料。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="table-footer" th:if="${not #lists.isEmpty(ticketCategoryListData)}">
            共 <span th:text="${#lists.size(ticketCategoryListData)}">0</span> 筆門票分類資料
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
