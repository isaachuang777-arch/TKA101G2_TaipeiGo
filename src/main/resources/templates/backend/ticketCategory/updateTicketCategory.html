<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaipeiGO ｜ 修改門票分類</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ticketCategory.css}">
    <style>
        .form { padding: 24px 30px; }
        .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 8px; padding: 10px 14px; border: 1px solid #ced4da; }
        .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); }
        .error-feedback { color: #dc3545; font-size: 0.875em; margin-top: 6px; font-weight: 500; }
        .btn-cancel { background-color: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6; padding: 10px 24px; border-radius: 8px; text-decoration: none; transition: all 0.2s; }
        .btn-cancel:hover { background-color: #e9ecef; color: #495057; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        台北<span>GO</span>了沒
    </div>
</div>

<div class="page-wrapper">
    <div class="page-card" style="max-width: 700px; margin: 0 auto;">
        
        <div class="page-header border-bottom pb-3">
            <div>
                <h2 class="page-title">修改門票分類</h2>
                <div class="page-subtitle">變更門票分類的名稱或啟用狀態</div>
            </div>
        </div>

        <form class="form" th:action="@{/backend/ticketCategory/update}" th:object="${ticketCategoryVO}" method="post">
          
            
             <div class="mb-4">
			    <label class="form-label">門票分類編號</label>
			    <input type="text" class="form-control bg-light text-secondary fw-bold" 
			           th:field="*{ticketCategoryId}" readonly style="cursor: not-allowed;" />
			</div>

            <div class="mb-4">
                <label for="ticketCategoryName" class="form-label">門票分類名稱 <span class="text-danger">*</span></label>
                <input type="text" th:field="*{ticketCategoryName}" id="ticketCategoryName" 
                       class="form-control" th:classappend="${#fields.hasErrors('ticketCategoryName')} ? 'is-invalid'" />
                <div class="error-feedback" th:if="${#fields.hasErrors('ticketCategoryName')}" th:errors="*{ticketCategoryName}"></div>
            </div>

            <div class="mb-4">
                <label for="ticketCategoryStatus" class="form-label">啟用狀態 <span class="text-danger">*</span></label>
                <select th:field="*{ticketCategoryStatus}" id="ticketCategoryStatus" class="form-select">
                    <option value="1">啟用</option>
                    <option value="0">未啟用</option>
                </select>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top">
                <a th:href="@{/backend/ticketCategory/list}" class="btn-cancel d-inline-flex align-items-center">
                    取消返回
                </a>
                <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 8px;">
                    確認修改
                </button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
