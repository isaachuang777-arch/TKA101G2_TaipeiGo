<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>權限不足 - TaipeiGo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"> 
    <style>
        body { background-color: #f4f7f6; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        
        /* 🌟 讓側邊欄變灰，並且完全無法點擊 */
        .sidebar { 
            pointer-events: none !important; 
            opacity: 0.5 !important; 
            filter: grayscale(100%);
        }

        .main-content { margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
        .error-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .error-card { background: white; border-radius: 16px; padding: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; border: 1px solid #e1e8ed; }
        .error-icon { font-size: 70px; color: #e74c3c; margin-bottom: 20px; }
        h2 { font-weight: bold; color: #2c3e50; margin-bottom: 15px;}
        p { color: #7f8c8d; margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6;}
        
        /* 倒數計時文字樣式 */
        .countdown-text { color: #e74c3c; font-weight: bold; font-size: 1.2rem;}
        
        .btn-back { display: inline-block; background-color: #3498db; color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: all 0.3s; border: none; cursor: pointer;}
        .btn-back:hover { background-color: #2980b9; color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }
    </style>
</head>
<body>
<!-- 側邊欄 (已被 CSS 禁用點擊與上色) -->
<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<div class="main-content">
    <div class="error-container">
        <div class="error-card">
            <i class="bi bi-shield-lock-fill error-icon"></i>
            <h2>存取被拒絕 (403)</h2>
            <p>對不起，您目前的帳號沒有權限存取此功能。<br>
               系統將在 <span id="countdown" class="countdown-text">5</span> 秒後自動為您返回上一頁。
            </p>
            
            <!-- 手動按鈕，執行 JavaScript 的回上一頁 -->
            <button onclick="goBack()" class="btn-back">
                <i class="bi bi-arrow-left-circle-fill me-2"></i>按此返回上一頁
            </button>
        </div>
    </div>
</div>

<script>
    // 設定倒數秒數
    let seconds = 5;
    const countdownEl = document.getElementById("countdown");
    
    // 執行回上一頁的動作
    function goBack() {
        // 退回上一頁
        window.history.back();
        
        // 防呆機制：如果他沒有上一頁 (例如直接貼網址進來)，退不回去，0.5秒後強制帶他回首頁
        setTimeout(() => {
            window.location.href = '/backend/dashboard/index';
        }, 500);
    }

    // 每秒執行一次倒數
    const timer = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        
        if (seconds <= 0) {
            clearInterval(timer);
            goBack(); // 時間到，觸發返回
        }
    }, 1000);
</script>
</body>
</html>
