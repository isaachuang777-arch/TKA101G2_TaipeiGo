<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理員全名單</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
    
    /* 基礎按鈕共用樣式 */
    .btn-toggle {
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s; /* 讓變色的瞬間有滑順的動畫過渡效果 */
    }
    
    /* 啟用的綠色樣式 */
    .btn-active {
        background-color: #28a745;
    }
    
    /* 停權的灰色樣式 */
    .btn-inactive {
        background-color: #6c757d;
    }
    </style>
</head>
<body>
    <h2>系統管理員全名單</h2>
    <a th:href="@{/backend/dashboard/index}">🔙 回到Dashboard</a>
    <hr>
    
    <form th:action="@{/backend/admin/it/listContaining}" method="get" style="margin-bottom: 20px;">
    <label>搜尋管理員：</label>
    <input type="text" name="keyword" placeholder="請輸入帳號或姓名..." >
    <button type="submit">搜尋</button>    
    <!-- 重置 -->
    <a th:href="@{/backend/admin/it/listAll}"><button type="button">重置</button></a>
</form>
<a th:href="@{/backend/admin/it/addAdmin}">新增管理員</a>
<div th:if="${successMsg}" style="background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 15px; margin-bottom: 20px; border-radius: 5px; position: relative;">
        <span th:text="${successMsg}"></span>
        <!-- 點擊這個叉叉，就會利用簡單的 JS 把這個 div 給隱藏起來 -->
        <button type="button" onclick="this.parentElement.style.display='none';" style="position: absolute; right: 10px; top: 12px; background: none; border: none; cursor: pointer; font-size: 16px;">✖</button>
    </div>
    <div th:if="${errorMsg != null}" style="color: red;">
        <p th:text="${errorMsg}"></p>
    </div>
<hr>
    
    <table>
        <thead>
            <tr>
                <th>管理員編號</th>
                <th>帳號</th>
                <th>姓名</th>
                <th>到職日</th>
                <th>狀態</th>
                <th>擁有權限</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <!--這裡插入listAlladmin()裡面回傳的adminVOList做回圈  -->
            <tr th:each="adminVOList : ${adminVOList}">
            <td th:text="${adminVOList.admId}">編號</td>
            <td th:text="${adminVOList.admAcc}">帳號</td>
            <td th:text="${adminVOList.admName}">姓名</td>
            <td th:text="${adminVOList.hireDate}">到職日</td>
                
            <!-- 狀態顯示-->
            <td>
            <!-- 如果狀態是 1 (啟用) -->
            <button type="button" th:if="${adminVOList.admStatus == 1}" 
                    class="btn-toggle btn-active"
                    th:onclick="toggleStatus([[${adminVOList.admId}]], 0, this)">
                🟢 啟用
            </button>
            
            <!-- 如果狀態是 0 (停權) -->
            <button type="button" th:if="${adminVOList.admStatus == 0}" 
                    class="btn-toggle btn-inactive"
                    th:onclick="toggleStatus([[${adminVOList.admId}]], 1, this)">
                🔴 停權
            </button>
        </td>
                
			  <!-- 權限顯示 -->
			    <td>
			        <!--權限list的admPerVO是空的 -->
			        <span th:if="${#lists.isEmpty(adminVOList.admPerVO)}" style="color: red;">
			            -沒有權限-
			        </span>
			        
			        <!-- list有東西 -->
			        <span th:unless="${#lists.isEmpty(adminVOList.admPerVO)}"
			              th:each="admPerVO : ${adminVOList.admPerVO}"
			              th:text="${admPerVO.admfuncVO.funcName} + ' '">
			        </span>
    </td>
                
                <!-- 操作按鈕 (修改功能我們下一步再做，先預留位子) -->
                <td>
                    <a th:href ="@{/backend/admin/it/updateAdmin(admId=${adminVOList.admId})}">修改資料</a>
                    <a href="#">修改權限</a>
                </td>
            </tr>
        </tbody>
    </table>
    <hr>
        <form th:action="@{/backend/auth/logout}" method="post">
        <button type="submit">安全登出</button>
    </form>
    <script>
function toggleStatus(admId, newadmStatus, buttonElement) {
    // 1. 防呆雙重確認彈窗
    let actionName = (newadmStatus === 1) ? "啟用" : "停權";
    let confirmResult = confirm("⚠️ 確定要將此管理員的狀態更改為「" + actionName + "」嗎？");
    
    // 2. 如果使用者點擊【取消】
    if (!confirmResult) {
        alert("💡 取消：帳號狀態更新"); // 完全照您的需求！
        return; // 結束函式，不發送 API
    }
    
    // 3. 如果點擊【確定】，開始用 Fetch 發送 API 給後端
    // 打包資料
    const formData = new URLSearchParams();
    formData.append('admId', admId);
    formData.append('newadmStatus', newadmStatus);

    fetch('/backend/admin/it/updateadmStatus', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text()) // 解析後端 @ResponseBody 回傳的字串
    .then(text => {
        // 4. 後端驗證成功，開始表演「無刷新變色魔法」
        if (text === "SUCCESS") {
            
            if(newadmStatus === 1) {
                buttonElement.innerText = "🟢 啟用";
                buttonElement.style.backgroundColor = "#28a745";
                // 狀態變 1 了，把按鈕的下次任務改成 0
                buttonElement.setAttribute("onclick", `toggleStatus(${admId}, 0, this)`);
            } else {
                buttonElement.innerText = "🔴 停權";
                buttonElement.style.backgroundColor = "#6c757d";
                // 狀態變 0 了，把按鈕的下次任務改成 1
                buttonElement.setAttribute("onclick", `toggleStatus(${admId}, 1, this)`);
            }
            
            // 可以選擇加上一個小提示，或是偷偷顯示在畫面上方
            console.log("狀態更新成功"); 

        } else {
            // 如果後端傳回 ERROR，代表發生問題 (例如沒登入)
            alert("❌ " + text);
        }
    })
    .catch(error => {
        alert("系統發生錯誤，請聯絡 IT 人員");
        console.error(error);
    });
}
</script>
</body>
</html>
