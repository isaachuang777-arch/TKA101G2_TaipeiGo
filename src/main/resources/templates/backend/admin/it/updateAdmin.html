<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改管理員資料 - TaipeiGo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d6efd;
            --sidebar-width: 260px;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f0f4f8;
            margin: 0;
        }
        .main-wrap {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2236;
        }
        .topbar-title span {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .content-area {
            padding: 32px;
            flex: 1;
        }
        .card-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8edf2;
            max-width: 600px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .info-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e293b;
        }
    </style>
</head>
<body>

<!--side bar-->
<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<div class="main-wrap">
    <header class="topbar">
        <div class="topbar-title">
            <i class="fa-solid fa-pen-to-square me-2" style="color:var(--primary);"></i>
            修改管理員資料
            <span>/ Edit Admin Info</span>
        </div>
    </header>

    <main class="content-area">

        <!-- 頂部按鈕 -->
        <div class="mb-3" style="max-width: 600px; margin: 0 auto;">
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i>回上一頁
            </button>
        </div>

        <div class="card-box border-top border-primary border-4">
            
            <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 60px; height: 60px; font-size: 1.8rem;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <h4 class="mb-1 fw-bold text-dark" th:text="${adminVO.admAcc}">帳號</h4>
                    <span class="badge bg-secondary">員工編號：<span th:text="${adminVO.admId}"></span></span>
                </div>
            </div>

            <form th:action="@{/backend/admin/it/updateAdmintoDB}" method="post">
                <input type="hidden" name="admId" th:value="${adminVO.admId}">
                
                <div class="mb-4">
                    <label class="form-label">管理員姓名 <span class="text-danger">*</span></label>
                    <input type="text" name="admName" class="form-control form-control-lg" th:value="${adminVO.admName}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">到職日 <span class="text-danger">*</span></label>
                    <input type="date" name="hireDate" class="form-control" th:value="${adminVO.hireDate}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">帳號狀態</label>
                    <select name="admStatus" class="form-select">
                        <option value="1" th:selected="${adminVO.admStatus == 1}">啟用 (Active)</option>
                        <option value="0" th:selected="${adminVO.admStatus == 0}">停用 (Inactive)</option>
                    </select>
                </div>
                
                <div class="d-grid mt-5">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-floppy-disk me-2"></i>確認修改並儲存</button>
                </div>
            </form>
        </div>

    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
