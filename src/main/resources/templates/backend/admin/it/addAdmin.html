<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增系統管理員 - TaipeiGo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d6efd;
            --sidebar-width: 260px;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f0f4f8;
            margin: 0;
        }
        .main-wrap {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2236;
        }
        .topbar-title span {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .content-area {
            padding: 32px;
            flex: 1;
        }
        .card-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8edf2;
            max-width: 800px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
    </style>
</head>
<body>

<!--side bar-->
<div th:replace="~{backend/fragments/sidebar :: sidebar}"></div>

<div class="main-wrap">
    <header class="topbar">
        <div class="topbar-title">
            <i class="fa-solid fa-user-plus me-2" style="color:var(--primary);"></i>
            新增系統管理員
            <span>/ Add Admin</span>
        </div>
    </header>

    <main class="content-area">

        <!-- 頂部按鈕 -->
        <div class="mb-3" style="max-width: 800px; margin: 0 auto;">
            <a th:href="@{/backend/admin/it/index}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i>返回控制中心
            </a>
        </div>

        <div class="card-box border-top border-primary border-4">
            <h4 class="mb-4 fw-bold text-dark"><i class="fa-solid fa-id-badge me-2"></i>管理員基本資料</h4>
            
            <!-- 錯誤提示 -->
            <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${errorMsg}"></span>
            </div>

            <form th:action="@{/backend/admin/it/createAdmin}" method="post">
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">登入帳號 <span class="text-danger">*</span></label>
                        <input type="text" name="admAcc" class="form-control" placeholder="請輸入帳號" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">登入密碼 <span class="text-danger">*</span></label>
                        <input type="password" name="admPw" class="form-control" placeholder="請輸入密碼" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">管理員姓名 <span class="text-danger">*</span></label>
                        <input type="text" name="admName" class="form-control" placeholder="請輸入姓名" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">到職日 <span class="text-danger">*</span></label>
                        <input type="date" name="hireDate" class="form-control" required>
                    </div>
                </div>

                <!--admStatus已經在Service裡寫 (預設開通)  -->

                <hr class="my-4 text-muted opacity-25">

                <h5 class="mb-3 fw-bold text-dark"><i class="fa-solid fa-shield-check me-2"></i>設定操作權限</h5>
                
                <div class="d-flex flex-wrap gap-3 mb-4 p-3 bg-light rounded border">
                    <div class="form-check" th:each="func : ${funcList}">
                        <input class="form-check-input" type="checkbox" name="funcIds" th:value="${func.funcId}" th:id="'func_' + ${func.funcId}">
                        <label class="form-check-label badge bg-info text-dark" th:for="'func_' + ${func.funcId}" style="font-size: 0.9rem;">
                            <span th:text="${func.funcName}"></span>
                        </label>
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <button type="reset" class="btn btn-light me-md-2 px-4 border">清空表單</button>
                    <button type="submit" class="btn btn-primary px-5"><i class="fa-solid fa-circle-check me-1"></i>確認新增</button>
                </div>
                
            </form>
        </div>

    </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
